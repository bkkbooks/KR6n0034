body:
  text: 問二障何故偏說三住斷解云一三劫分限故二初起無漏及以相續圓滿別故三分別二障一時斷故六識二障永不行故二障俱生永斷盡故四最初能捨異生性分段生死永盡處故變易窮盡處故五於無相中有功用無功用故圓滿故故三頓斷也問五識中所知障種八地已上意識對治斷彼種不解云亦斷以障地故餘六識俱煩惱障種見所斷者三乘見位真見道中一切頓斷者解云即唯此文五識中有分別起惑不爾如何言餘六識俱煩惱障種問二乘斷惑四道差別加行勝進總別不定為不於觀解云於一觀隨斷幾品乃至斷九唯一加行一勝進道無間解脫品品別起似其根鈍證無為時不斷惑故若有漸次九品別斷數數於觀加行勝進品品別起此依修道非見道也問先世俗道所伏修惑後入諦觀斷道同異解云一道非更別起間加行等四道為總能斷要無間道方能斷惑然唯識第八云解脫道斷粗重約此義邊亦名斷道或約斷種名為斷道解脫不能故非斷道若二乘斷惑加行勝進或總或別無間解脫必各別起者何故對法第九云後品所有加行無間解脫皆前品勝進准對法文即以前品勝進為後三道無間解脫即不別起解云對法意約道理進修唯識論中依別行解亦不相違問六行四通苦粗障靜妙離更相配屬不解云隨一為無間隨一為解脫問二乘斷惑斷習氣不解云不斷若爾何故唯識第九云為斷品粗重性故起解脫道此釋有二一云言解脫道斷粗重者約菩薩流約二乘二云粗重有二種一粗二細二乘斷粗而不斷細由約粗故解脫道中二乘約斷由約細故故說二乘不能斷也如入二定斷苦根等此約二乘斷粗而說問二乘無學身中所知障在與煩惱障同體起者有何相耶解云二乘無學雖無煩惱然有餘習未離所知如有聖人時坐錯而等即貪餘習也問損伏有幾答如大論十一云損伏有三種一遠離損伏二厭患損伏三奢摩他損伏遠離損伏者有三種謂如有一弃損家法趣於非家離諸欲具堅持禁戒於諸欲亦心不趣入心不流散等厭患損伏者謂如有一或由過患相或不淨相或青瘀等相如理作意如是如是厭患諸欲惟未離欲然於諸欲修厭逆故心不趣入奢摩他損伏者謂如有一由世間道得離欲界或離色界欲彼由定任持心故於欲色中心不趣入乃至廣說若聖弟子由出世道離欲界欲乃至具得離三界欲爾時一切三界染汙諸法種子皆悉永害何以故由聖弟子於現法中二不復堪任從離欲退更起下地煩惱現前或生上地亦不堪住從彼沒已還生下地如穀麥等諸外種子安量回處或於乾器雖不生牙非不種子若火可損爾時畢竟不成種子內法種子損伏永害道理亦爾問此加行等四唯無漏解云通二若加行智不通無漏若加行道通漏無漏問四道中佛果有幾解云有二解脫勝進無趣求故不斷障故故無二道道離障故是前品道之勝進故非欲進斷品名勝進道問諸我我所有何別耶解云有體有用主宰任持二相別故問第四如云非我執等所依取者等取如何解云盡理而言等取我所邊見我慢我愛及以無明等所依取故問如非我所何故我見等滅所證真如名無攝受解云於三地中有法愛故尋教取如言證解等有所繫屬今執斷故故所顯如無攝受也問第五六地觀四諦境及十二支已得平等無有染淨第七地中純無相觀理應離相何故八地名不增減離染淨耶解云前地雖得惡作功用此地任運偏得此名也問轉依四義中能伏道中有漏伏道為唯漸亦能頓耶解云有釋唯漸非頓以力劣故有釋能頓如世第一法伏分別二鄣頓不應起故問若加行智唯有漏者加行智何對法第十金剛心有二道一加行道二無間道解云以無漏觀心任運趣入根本智故非有漏也又解云彼據二乘非菩薩也以彼來能究竟故也問若加行智唯有漏者但言加行非能斷道即攝有漏非是斷道重言有漏豈非重耶解云理實而言皆唯有漏有漏道言但簡無漏有漏道中亦有加行無間解脫三種道六斷中有三道故加行智言理觀智中簡正後得二種智也問何故迷事隨眠通三智斷答不違理故此約二乘非望菩薩菩薩修位不斷迷事惑故唯斷所知是根本智間且地地中前八品斷迷事惑第九品斷第六識中俱生我見等為數數入出觀為一觀斷解云此據二乘數入出觀若一觀斷者前八迷事亦正智斷無一觀中正體後得二智別故問第六俱見同第七惑至金剛斷此有何共解云有上界聖人起無漏道却斷下地我見種失若許爾者即應聖者現惑閏生違理教故第七俱惑非閏生故此有四句有依下地斷上隨眠如下地地得聖斷上地惑種有依上地斷下惑種如生上地得無學果起道斷下地第七俱惑第三句七生上下地斷自地惑第四句除上爾所此以六七相對得成四句又解云菩薩亦能以後得智斷十地位中斷所知障有執非執非執者亦名迷事故亦許斷以位障知故如煩惱障先斷迷事例亦無失義准可知大論五十依有八種一施設依謂五取蘊由依此蘊施設有情命者等及依此欲施設種種名字生類種性壽量事等是名施設依二攝受依謂七攝受即自己父母妻子奴婢作使僮僕明友眷屬七攝受事三住持依謂四種食能令已生有情得安住故此則食為所依四流轉依謂四種識住及十二支四謂色受想行識是所依受等俱起總說為住或依五趣識依四法故論說云色趣受趣等也由此四趣識住及十二支皆是流轉之法故名流轉依也五障礙依謂天魔謂有作善之處皆往壞之故障礙依也六苦惱依謂一切欲界皆名苦惱依由依此故令諸有情領受憂苦七適悅依謂靜慮等至樂由依此故諸有情類或入彼定或生彼地長夜領受靜慮等至所有邊適悅八後邊依謂阿羅漢相續諸蘊由依此故諸阿羅漢相續任持最後身問何者當常現常解云魏時有二三藏同於內各在別處翻譯南院安置勒那三藏云衆生身中已具三十二相一切功德皆悉是常但由障故不得顯現後時斷障部此則佛身更不別從淨種而生故名現常由在南院故曰有道法師非是吳蜀故云南道菩提留支在北院翻譯立云一切衆生後時成佛得有常之身必從淨種而生生已常住非謂衆生已得常身故曰當常以在北院名曰北道法師也十地論頌云定滅故者定滅二字雙標二種定即本性涅槃滅即方便涅槃以本定之稱為定也斷障顯故稱為滅者如其次第成同相本性不同相為方便得也問無餘依界云何四種寂靜解云大論五十有此四種一數教寂靜者無餘依中離離一切言教數量故二一切依寂靜者即前八依流轉依等永離故三依依苦寂靜者謂前八依所生諸苦於無餘依中非但八依寂靜八依所生苦亦寂靜四依依苦生疑慮寂靜者若在有餘依中或異生等亦八依或無學聖唯後邊依於此依上有餘若生有餘有情於依及苦而生疑慮為得究竟能滅此依及苦耶為不爾耶今於無餘依中此等諸疑於中永斷也以依及苦總永滅故斷疑勝鬘云世尊阿羅漢辟支佛有怖畏故是故阿羅漢辟支佛有餘生法不盡故有生等者解云羅漢辟支佛利根者得二種智謂盡無生若鈍根者但得盡智不得無生智何以然者若鈍根者記緣惑滅名為盡惑恐退故而不能緣當蘊不生故非無生若利根必定不退當蘊定無生理故得二智也然此上地分為四分謂盡智為二謂我生已盡智中更開梵行也已立智於無生智中不受後有智更開所作已辦智此約二乘於自乘中定性之者於三界中果有段生死之中已斷除故具此四智故論中言我生已盡梵行已立所作已辦不受後有今此經中有餘生法不盡故有生者說我生已盡智也餘生法者俱無明經地名為集諦有生者變易苦諦也有餘梵行成故不記者三界煩惱對治道名為梵行而未能斷所知障故有餘道可修未滿足故名為不純記者具也事不究竟故當有所作者解云得煩惱對治道未修斷所知對治道故云未究竟當有所作者當修斷所知障對治故也若就分段應云所作已辦已斷煩惱障故若就變易故云當有所作也經云不度後故當有所斷者解云若約二乘自果是不受後有智今約變易生死果未盡未盡故故云不度彼彼者變易果也當有所斷者無明住地為變易因故故須斷之故云當有所斷也經云以不斷故去涅槃界遠界解云以不斷無明住地故去常樂我涅槃界遠也解云有餘生法不盡故有生者有苦諦也餘生法者集諦也事不究竟故當有所作者有餘道諦也不度彼故當有所斷者顯餘滅諦也問所弃捨中餘有漏法及劣無漏二師別釋初師云金剛心時鏡智得生得名佛不解云此師之意惟鏡智生然未成佛以未起解脫道證彼滅此時但捨粗重彼解脫生唯證滅也三妙觀察智攝觀無量總持定門者攝謂攝持觀即觀察總持者念慧為體即陀羅尼門定即三摩地門謂申此智攝持觀察總持定門發生功德珍寶也問四智心品何故唯有二十二法唯論前文尋伺亦許無漏解云因中二智容尋伺俱今此因果合說故不論之問何故諸餘功德無量無邊何故四者攝之總盡解云諸功德皆是四智作用差別故不離智也體攝用也問初師云金剛心時鏡智生者此師如何解對治無間位後盡智等生解云此師意云無間道者更不隔越即盡智等生同時名無間也問究竟位相對何得名解云對二二乘惟得菩薩涅槃臥尊勝故二對前四位因位非究竟也諸漏永盡者離雜彼煩惱非漏隨增離二縛義性淨者簡二乘無學善有漏等惟亦離縛而非性淨是前有漏類故猶有第七所知障俱非性淨故圓者異一切二乘有漏無漏因未圓故明者簡二乘無學無漏彼望自乘惟圓不明也問第二師云如來根境妙定生故法界色攝為取空境為取定果解云此意由定方便為先擊淨第八無漏法處根境種生若取定境不應得與非佛五識為本質也問既爾如來身中得有內外二處根境不耶解云但有根相非五識依以前五識性散亂故問第二師云成事智與淨第七相應依眼等根緣色等境是成事智既無五識此智與誰依眼等根耶解云第七同依五根緣五外境是非成事於根自在等發識故問究竟位云此又安樂無逼惱故者諸有漏善亦得三果樂亦無逼惱何別解云有漏善業惱逼有情三界變果故非安樂也自受用身云及極圓淨常遍色身解云衆德滿足名圓離障垢盡名淨時無間斷名常處無不稱名遍也相續言簡自性身無生滅故堪然簡變化身有時簡斷故問若依分辨唯識初師立義相見分不實以虗從實名唯識者無分別智緣真如時無有相分如境非虗如何以境從心名唯識耶解云此師意云今此論且除真如非所變故或於境中少分實有位多分說故言識也或此師意相分與識同種故分虗空也後師別種故並實有謂諸如來有七最勝第七名為住最勝然位有三謂聖天梵住空無願相及滅盡定是聖名住四種靜慮四無色定是名天住四種無量是名梵住於三住中如來多住中四最勝住於聖位中多住空門及以滅定於天住中多住第四靜慮於梵住中多住大悲聖位空門及以滅定最勝故四種靜慮定慧平故依梵摩喻經佛說法聲有八種謂最好聲易了知聲濡暖聲和調聲尊慧聲不誤聲深妙聲不女聲問云何一百三十佛不共法答如二十八說謂三十二丈夫相八十隨好四一切種清淨十力四無所畏三念住不誤大悲無忘失法永斷習氣一切種妙智非二乘等共也問云何三住答三十八云謂聖天梵住當知空無願相及滅盡定是名聖位四種靜慮及四無色是名無住四種無量是名梵住於三住中如來多住四最勝住於聖住中多住大悲由是如來晝夜六時晝三夜三常以佛眼觀察世間推增減我應令誰未種善根而種善根乃至廣說問一切如來功德平等以不答一切功德平等唯除四事一者壽量二者名號三者族姓四者身相一切如來於此四位有增有減非餘功德又非女身能證無上正等菩提何以故一切菩薩於過第一無數劫時已捨女身乃至安妙菩提座曾不為女一切母邑多煩惱故乃至廣如大論三十八說
