body:
  text: 大乘基撰問能詮諸法謂名句等正應為因何故取語而非名第解云語通三性是業性故除佛名外餘皆無記故不取之文解離散之外更無別體非思發故故非因體也問何故大論集論隨說因體語及名想差別不同解云大論約能取詮以辨因果集論意者就生起義以辨因果名等三性起語故即語為果又解大論通約一切漏無漏等為語所詮論而明因果集論三法為因依染分故也問觀待因體何故但取能所受性非餘心所觸等法耶解云受遍諸心非欲等法就遍諸心受須屬己解等不爾故唯取受而非餘也問觀待因何非引發定異攝受等攝解云以疏遠故若爾定異攝受應唯親因定異因中通業種故解云增上有親疏觀待閏疏不例業等又解若親相待亦是性因下得果中約疏相待故不言得等流果也問牽引因得無為不解云不得以種子為體不生無為故若爾大論何故言得無為解云由聖道得無為約遠展轉非此因生問無漏種子以何為閏解云善友聖教擊發等故問所緣緣體通一切法如來未法為所緣緣體此即果生因後如何次第解云羯賴拏是作具用羯賴多是士夫用以士夫望牙生等為士用依水土等望牙生等為作用依疏無力故此約無記故問攝受非親因何能辨果生解云助因緣力攝受果故對法云如日水糞等望穀生等雖自種所生然增彼力也問准何得知引發因准引同類勝品而非下耶解云顯揚等云欲界與上界無漏為因色界與色無色為因而不言與下界為因也問觀待同事相違不相違四因皆云於生等餘因不然解云此四寬故說生等餘因狹故不說之若爾云何大論顯揚但說後三觀待因不說解云彼論唯望有情待於情欲求飲食等而作法故體即狹故不說生等也問牽引生起更無別體如何得有六因不同解云未閏之時牽引全餘四少分除生起因被閏之時生起全餘四少分除牽引因無別體故以餘故四因通親疏故今唯取親故言一分也問餘定異等三容有疏因引發唯親何言一分解云引發通種現今但取種故言一分問何故菩薩地三十八取二種子為能生因尋伺第五通取種現生起為能生因耶解云菩薩地約種為因生就為二尋伺地意但是因緣名生起因非唯取種彼言生起不約已閏但取現種能生果故名生起也問同類因望勝劣品與何為因解云下品因望下中上品果非上品因引中下品果非因勝品引中下品果大論三十八等皆說善增等為自果故問牽引因望遠因果是因緣不若許成者何故第七解四緣中解因緣豈現種因緣中言能引次後自類功能及起同時自類現果而不言引遠現果又解種子第二義中云依生現果立種子名此對同時現行方成種子解云引遠自果亦是因緣而第七云引因時果且約相顯故作是說若不爾者此牽引因總非因緣如何得有親疏二因論不應云業去果遠習氣亦爾又菩薩地十因二因相攝如何二因是能生因故知牽引因親也種子第二義云依生現果方立種名由對自果方立因名此就相顯亦不相違問牽引生起二因唯以種子為其體者何故雜集第四無明望老死為牽引因鄰次望行為生起因又菩薩地三十八云一切種子望後自果名牽引因除種子外所餘諸緣名攝受因解云牽引生起二因皆通親疏二種子中有業種子故對法等說無明望行乃至老死為二緣故然大論等約種子者就勝而說對法現行亦二因攝問真見依處引證涅槃此亦可知引後真見無間何別解云同一剎那引證涅槃不約自類又解謂助同時及助後念引證涅槃又解同體義分理亦無失引後聚起等無間收引證無為真見攝也問引發因通以種現有為之體種現相生通有四句種現相生必應同品如何論云能引勝品解云且種生現初重之位與彼能重同品至生果時生同品勝果故以現重習轉成勝故若無現行重習唯生同品現行重習准此應知問隨順依處能引勝品及以同類名引發因未知引起同性品是何因攝以同性故解云是六因門中同類因攝又解是觀待因攝待勝引故又解是定異同雖引下品是同性故定異餘性者更思之問引發定異有何寬狹解云定異因寬引發因狹定異通異熟然約東地狹引發唯性同即引異界由此下文引發不言得異熟果問若引發因唯約性同非異性者如何得有非因緣種耶解云若論種子具有親疏若引發因唯約同性由有業種即非因緣各據義異亦不相違問相違因有幾種答有六如大論三十八說一語言相違謂有一類或諸沙門婆羅門所造諸論前後相違二道理相違謂為成立諸所成立諸所知義建立比量不與證成道理相違三生起相違謂所生法能生緣會四同處相違謂明暗貪瞋苦樂等法五怨敵相違謂毒蛇鼠狼猫狸鼷鼠等法互為怨敵惡知識等六障治相違謂修不淨與諸貪欲修慈與嗔修悲與害修七覺支八聖道支與三界繫一切煩惱於此六義中正意唯取生起相違問士用果假者士夫及以實法二種得果何別解云前師假者土夫所謂唯有士夫力用謂有為故實法通得無為以一因為作者緣為作具得無為果徒囑為名名士用果也問實法士用亦得無為何故離繫果不言士用依處得解云此約假者故不說之問觀待因能令於果生住成得何故證離繫不說觀待因解云前文通說疏待此就親待故不說之又解彼約有為清淨觀待因故又解待能證有所證故此約無為非親待故故不說之問隨順依處唯引自類依名總即自等流果如何太寬解云雖引同類由有異界及無漏無為法者非等流自類果故全取寬也如何真見依處亦引自類等流等無間得士用故又解現望於現非因故除之也問增上異十因四緣一切皆得者豈不雜亂又前文變謂除前四餘所得果解云前據別增上緣此文約通因此應解云若約別體應除前四果之因也問不相違因攝無為法如何為因解云非親生果不但障礙果生為此因體亦攝無為也問何種於果有助不礙解云如作意種及根種望識等生是助力如異類識等種望異類識等生是不礙也若爾無漏現種於所斷惑種為障礙不為礙耶解云於所礙者即不成因於非所礙除得為因也又解不成因以能礙假類也相違因攝問種生現行分別因果位何別解云因望見分為所緣果位通望自證分為所緣由此廣前頌言由一種識如是如是變問同聚異體相互為質得成所緣五與第六同緣五境應得相緣同所緣故第六第七同緣第八所變相分應互為質得果互相緣論何不說解云以同所緣義准應陳略而不說又解理不應許同聚相緣勢力相及得互相託許互為緣異聚諸識非更相應故不相緣若爾前七於八異聚諸識如何得緣解云第八緣七初緣種說非約相分又七與八所緣不同故不成例若第七八所緣不同非成例者五與第八同緣五境應許例成異聚第八緣五識故解云第八緣五所熏種子以為所緣以五相分以為本質質影現種不同五六故不應例問大論第九云福業者謂感善趣異熟及順五趣受善業如何是正感何業是隨順解云且作一釋招總名感別業名順又解云問雜集第七解不動業云如欲界中餘趣圓滿善不善業遇緣轉得餘趣異熟非色無色繫業有如是本未知更遇緣造諸趣業時不受名之為助即以此造業受餘趣果名為勤耶解云即以此業受餘趣果或同趣中處所改如六欲天上下轉故或生人中四天下等或有無人業改身受故或傍生業受惡趣故同聖人不造新業第三果人資下故業故五淨居何故不有法爾五淨居業而資下業以為上緣耶解云問同聚同仗一質可同一所緣自證緣見分如何同所緣解云且約見分不說自證又解自證但緣見相似故說同若爾受等見分殊如何說相似解云俱是見分故言相似也問何故等流增上易感異熟難招解云等流同性熏時同世即能生果異熟性異又故異世方始果生非造業時即能得果增上更無別體即等流性又解種望現行等流亦增上種子望自類種但是等流非增上約但一邊非書理也若爾現報業豈不同世耶解云現非總報故不論也問三熏習約界等寬狹如何解云且名言熏習中表義唯在欲界及初定有尋伺故此熏習至第四定倩下尋伺起言說故或通無色無色諸天佛邊聽法故若顯境名言通三界九地皆通有故有支我執亦通三界第二三性分別名言熏習通三性有分唯善不善我見熏習通不善有覆俱生唯有䨱欲色界分別是不善故第三約識分別表義名言唯第六識緣名熏習顯境通前七識除第八識不能熏故有支通六識善不善性故我見第六第七識第七識唯俱生非分別故第四漏無漏者名言通漏無漏無漏亦依表義顯境二種名言熏成種故餘二熏習唯有漏可知第五五位者名言通前四位唯除佛果佛果不熏故第六有漏至第八地八地已上唯無漏故無漏通十地佛果已前五識唯有漏第七十地通漏無漏有支非聖聖不造業設造別報非有支攝非行支故名言所攝或類相從亦有支攝分別我執唯異生資糧位起內法異生不共無明已伏斷故故亦不起俱生我執二乘無學八地已上菩薩及諸如來皆悉不起餘如理思之問唯修所斷俱生我見受是有䨱亦更有餘解云亦有故緣起上卷云若由欲愛告諸福行彼信為依乃造斯行由於生死起定信故此愛及取由信攝伏故我說為有䨱無記若法欲界有䨱無記於發諸行無勝功能以此文證離我見等俱起法亦有獨顯欲受等無記即緣後有起愛閏生愛等或餘本有位起此愛等是不發業煩惱及除上二界無明等發業者外餘一切不發業或餘者皆是此中發業攝餘隨起有䨱等是閏生攝問大乘由我見熏習自他差別佛果無我見如何別自他解云由無我見此彼證別故問佛果既無名言熏習如何有十八界異解云由有無漏名言後得智熏習以成其種故生十八界也故深密等云諸淨立等勝出世間善根所起解云勝出世間即後得智也問十地位中後得智熏習能生佛果十八界不若生者因位自無無漏身等如何緣他佛身生無漏本質若不生者如何言由後得智熏耶解云此有二釋一云不生以因位中不熏佛果十八界種故彼緣佛身但有相分種不生本質無有緣他熏成生他質故由此理故但從法爾種生更釋云以得緣他質為增上緣故說得生問薩婆多何故離繫果非六因得未知四緣是何緣得解云正理師意無為無法非六因四緣之所得然六因之外更立能證因為第七因如正理第十七廣說問離繫果何緣得答增上緣得攝受因增上緣攝故問趣生雜亂於人中起天趣業起上定可爾於上天趣中起人趣業以不解云有如第四定中起謗滅耶見生地獄中此即生上起下界業也問無色四陰何故名名答俱舍第十有三義釋彼云隨所立名根境勢力於義轉變故說為名解云隨世間所立之名能詮諸心心心所法於彼轉變而緣又云云何隨名勢力轉變謂隨種種世共立名於彼彼義轉變詮表即如牛馬色味等名又云此復何緣標以名稱於彼彼境轉變而緣解云謂牛馬等名詮表之處心心所法轉變而緣故稱為名第二又云又類似名隨名顯故解云彼意云名由聲顯發心心所法由名詮顯猶如彼名稱所發名等不相應非麁顯要依聲方顯今心心所法非如色等麁顯要藉於名方得顯故即從詮名亦稱名也三有餘師說無色四薀捨此身已轉趣餘生轉變如名故標名稱解云四薀捨此生受彼生猶如於名捨此詮彼展轉而詮也問正理第二十九釋四薀名名之能表召故解云名能表詮乎召心所法緣顯境界義當大乘顯境名言也若爾不應全攝不相應者難意云若言表召故稱名者不相應中唯名表召餘即不能如何言四薀名名也答如有色言者意云如有色言者意云如有色言未必全攝色薀此亦爾也問大論第十釋四取云謂於耶願所起戒禁而起貪者豈不戒所於戒起貪名為戒取若爾何故三見是所報執能執貪名取耶戒是所執何故獨貪名戒取解云執戒亦是見於彼起貪見取收耶戒由非見於戒起貪戒取攝問惑業苦三十二有支相攝何寬何狹解云三寬十二狹三中惑攝一切煩惱十二中惑唯無明愛取就無明中唯取能發正感後有業者業通總別行唯感總除順現受三中之苦通總別并聖者身十二中苦唯總非別唯凡非聖也問若依論文第八識種為識支者何故大論第九末以六識為識支彼廣釋已云此於欲界具足六種色界唯四無色唯一益九十三中自有文云行為緣故令識轉變此識現法但是因性攝受當生諸識果故約就一切相續為名說六識身既有此解故言六識者是隨小乘說彼不知有第八識故又一身中約一切識相續為名說之六識其實唯第八果報主故問何故得知識等五支唯種非現解云大論等云胎藏苦故又五十六說五種胎藏者解云胎藏苦者非謂母胎以是種子能含藏五果說為胎藏苦又解胎藏者實約母胎未生現行故說唯種也問何故十二名緣生解云五十六云無有主宰作者受者無自作用不得自在從因而生託衆緣生本無而有有已散滅唯法所顯能閏所閏隨相續法名為緣生大論第十釋云由煩惱繫縛往諸趣中數數生起故名緣起此依字釋名即緣依字起字解此名問何故十二支如是次第解云大論第十有三復次初云諸愚癡者要先愚於所應知事方起耶行起耶行故令心顛倒心顛倒故結生相續結生相續故諸根圓滿根圓滿故受用境界受用境界故耽著希求耽著希求故煩惱滋長煩惱滋長故發後有業業滋長故五趣果生生已變壞老死生起故十二支如是次第第二約二緣建立前六支內身緣立後六支境界緣立第三約三類有情建立一樂出世有情滅十二支增白法二樂世間有情立前六支三樂著境界有情立後六支廣如彼釋問何故順起緣生如是次第起觀逆觀光觀老死解云依諦次第先苦後業也問如經言貪嗔癡為因能發諸業何故此中唯說無明解云貪嗔癡唯發非福此通三業故唯無明問十二支分如何辨因果答且約等起以辨因果無明為因乃至老死為果故大論第十云初一唯因後一唯果餘通因果二本末因果無明愛取三是煩惱業苦本故唯是因攝生老死二唯是果體是苦惑業果故亦種亦果故餘亦因亦果是煩惱之果生老死之因故第十云三唯是因二唯是果餘通因果又生老死唯果以果末故前六及愛取有三唯是因本故受通二種三異熟非異熟因果即識等五及生老死七種是果識等五種望生老死雖是苦因於現起位亦說五為現行即在生死位中而說故是果攝異熟法故亦正果躰餘五是因惑業性故非異熟攝中邊上卷云有因雜染果雜染因雜染者謂煩惱業分果雜染者謂所餘分即七法也四熟未熟因果前七是因猶未熟故愛取等後五是果名已異熟故謂無明熟成於愛取有是行等六法就成生老死二正是就時謂就變故五正熟非正就因果熟生老死十非正熟即前十支是因位故大論第九等云能引俱是引因能引生老死二種故問若無明為緣皆行耶設行皆無明為緣應作四句自有行非無明為緣無漏及無䨱無記行有無明為緣而非行謂除行餘支第三句即行支第四句識無漏識等餘支相望皆作四句順後句答廣如大論第十問名色等四是所引支何故緣起上卷說為所生解云依當生位故作是說若爾識有當生何故不說解云已說識支通能所引更不重說為所生也若爾唯應說為所引所生何故說一分受為能生支解云約現行受有二種一內異熟受彼經說為所生二境界受為緣生受等彼經說為能生支攝亦不違理問內異熟愚唯能發業亦能閏生解云通二今且隨增大論云全界煩惱皆能結生故由此准知亦閏生也追及欲境界造不善業故問無明有不因若無生死有始若有應無窮或應別說解云有因不如理作意為因佛不說者大論第十云彼唯不斷因即彼非雜染因依染因說支故又彼無明自性是染不如理作意自性非染非染之法不能染彼無明故問老死有果不若無生死應有終若有應無窮答有憂悲苦惱十地經第八云此死別離時愚人貪著心熱名憂發聲啼哭名悲五眼相對名憂苦轉多名惱若爾何故不說之也解云一緣起順生死流起義憂悲離散行相高舉不順流轉故不說之此依舊說同小乘說又解云立支要須遍定此愁歎憂苦不遍不定故不立支也問生老死是三相不若是相者何故不說住相為支又滅相過去體即是無如何無法為支體耶若非相者是何生等耶解云以緣起支是流轉義住不順故所以不支又濫無為故不立住釋後難者緣起是有為相故生老即生異相唯死滅滅相是無有法方成緣起法故謂緣起支約相續立即是正死末後之時及前將死總名死支非例滅相入過去也若爾諸論一期四相但依相續死滅何別解云一期剎那短長雖異依世立相其義一也亦同依過去方立滅相但表此法後時是無非滅相位即是死支以此死支顯將正死雖俱是假依世不同然依滅相以立死支令生厭故故依三相立二支也問生老等支即生等相生等二支應行蘊攝解云以彼三相顯此二支即唯三相以二支體即現五蘊故處中死觸非即滅相以將正死時解支節等是死觸故豈以名死體即滅相由此二支雖依三相以其名而今生厭體非即非三相攝也問論胎卵濕三生諸根次第起何故大論第十解生支中云出現云何謂濕化二生身分頓起解云據實濕生身分次第生起故九十三說除在母胎如胎生故彼言濕生亦頓起者謂濕化初生必有身分手足等頓起與胎卵異故云頓起非謂諸根非次第也問續生時因識相續經幾時解云即初剎那或一七日次識位後五根未滿已來果名色起令因名色相得增長以果顯時令因增故即四七日已前此中五支皆應有因但識中說文顯通下次前之名色四七日後五根滿時至鉢羅奢佉因六處明盛根相利故依此六處發觸相顯因觸起受因受相增爾時乃名受果究竟問若立二支以顯三苦二支通三界三苦亦應通解云且約欲界若色無色即云三相問緣起上卷無明十一殊勝義者何答頌曰所緣行相及因緣等起轉異并耶行相狀作業與障礙隨轉對治為十一第一所緣殊勝者謂以一切因果所有過患諸雜染法及以因果諸功德法諸清淨法以為所緣由無明故不厭雜染不欣寂靜二行相者隱覆真實顯現虗妄以為行相三因緣者與三雜染作所緣因令三雜染增長生起由無明力廣如經釋四等起者謂迷當來及現在世所有自體發起能引所引及能生所生十二緣起也五轉異者有四種隨眠纏縛相應不共由此謂無明惑由三種皆生轉異故名轉異六耶行相者於諸諦理皆能發起增減之見七相狀者有二種相一微細自相殊勝二遍於果於可愛非愛俱非境中名共相殊勝自相微細中通無明四皆微細於遍三境中皆不了知覆蔽真理顯現虗妄也八作業者與流轉作障礙寂靜九障礙者能礙勝法及以廣法勝法者謂五根即信等廣法者即聞等三慧也十隨縛者隨逐有情繫縛三界十一對治者此無明以二種智為能對治生法二空之智廣如彼經也問依初未至定斷欲界惑無間解脫各有九心於何心中得修根本解云第九解脫中得修根本問得至第九解脫道即便出觀未入上定而命終者欲色二界何處受生上界未至應非行支若生上界未入上定如何得起上界愛取解云得上定者雖未曾入得起上界愛取閏生問若欲界惑依未至斷未盡者彼未至定成行支以不解云若至命終必應能斷不爾即退還生欲界也問愛取二支何非雜相愛增成取故解云增未增時體相異故若爾業與五果種子閏末因緣義許成雜相愛望於取亦有緣而非雜相也解云取中有多染法故愛不成離若爾應非因緣解云且據自類說有因緣以理言之因緣非遍問諸緣起支除無明外皆依自地者豈不愛取亦許上緣大論等說下地煩惱我見愛等能緣上故解云但許下實能緣上地非即閏彼上地行支故無邊也又解彼總緣貪得緣上地閏生之愛唯約緣故不相違也閏生愛取有分限故故緣起云愛取二支自界所行有分齊故問愛緣當生地愛即唯同地何故言亦解云非唯自地命終生自地自地復生異地亦緣彼地證唯同地故致亦言又解非但受支愛亦自地故也又現在受亦為愛緣如彼無明異地緣故此受與愛有踈緣故問無明發業既許異地愛取閏生何要自地解云發業是等起因踈故通異地閏生是生起因親故唯自地也又解無明迷境寬通發異地業愛取貪愛生是親故唯自地閏問受緣於愛許通異地行緣於識應亦許然解云受望於愛疏遠通異地行望於識異熟因唯自地問識等五支為因生等二支為果因開果合行因有異何不爾耶解云業閏成有更無別體故不別開若爾有通非業何故不開解云雖有非業俱近當果勢力業故總立有名問閏業名有同體何故名異解云初造業成名行近能辨果有也問業體唯三總唯名行何故能閏之愛別立二支解云一發業成通名為行數閏方能果起故立二支問何故小乘須立三世十二支解云小乘答曰謂有外道撥無過未說法自然常我等生愚二際故說有緣起無前際故說諸法常無後際故說諸法斷今說二因在過去有過去世因業而生法非自然常我等生體非常住有因所生有因所生有未來二果破法後斷非即解脫體轉輪故現在五果三因故非自然起後有因生故說二重三世因果也破之如論問愛取二支如何無記欲界亦通不善無記二性閏生有覆經論誠文欲界四取說是不善誠證非一上界此二皆唯無記問若爾取中既通四取如何乃言修惑正閏見惑助閏豈不取支是助閏耶解云彼是助閏合名取支問若爾修惑助發合名無明解云二釋一云亦得論據正發且說無明文影略故二云不爾業無重發重唯正非兼閏生得重正兼通說是故取支通見所斷問若唯三是染者何故大論第十四唯是染并取老死解云以老死支有憂非假說為染尅性無記異熟性故也問七分位中起染故假說為染職等五種依何分位解云依生當來現果之時以為分位若爾至生位時唯是生老死如何有七解云由果中逆說故有七也問諸心心所皆有行相何故六行遍名行相解云行謂見分即了別用即諸心等皆等有之然六行體即是慧故簡釋用強偏名為行如四諦十六行相也大論第十依支離支一分非全分者唯依上地行支離下地支非依上地具有諸支故言一分問資下故業生五淨居等更等何處解云淨居外第十地菩薩大自在宮大論第四對法第六十地論等說淨居天上有自在宮第十地菩薩當生其處問異熟果愚真勝義愚何位能斷解云有說初修斷後見斷此理不然緣起云外道異生由四無明發福等三行內法異生唯除不共無明餘三無明緣行不放逸者行非無明為緣且對法云異熟果愚發悲福行真實義愚發福不動行若初愚修斷後愚見斷者豈見道斷分別之惑唯發福不動行修道之惑發悲福耶五十九云三惡趣業唯分別煩惱能發非俱生豈發非福行無明修道斷福不動行無明唯見除若故云發別報業者便非行支即發總報惡趣業愚實唯見斷云何乃言異熟果愚修道斷耶又解此論二師皆說正發業無明唯見斷故設彼後言異熟果愚迷前七苦真實義愚迷第八苦大論第十云迷世俗苦起非福迷勝義苦造福不動勤法第六云前七苦是世俗苦第八苦是勝義苦故發非福行無明是修道斷餘見斷者不然豈以世俗言同故一切處文是一世俗以易智故名世俗也唯勝智境故言勝義非福果世俗知是苦名世俗苦福不動果勝智方知是苦名勝義苦非分八苦而說名世俗勝義彼八苦中前七易知名為世俗第八難知名為勝義非謂前七是迷發非福行云世俗也若不爾者前七苦中第六七是壞苦豈色界等無壞苦耶彼若有者迷之何故不造非福又惡趣豈無第八勝義苦何故迷之但造福不動行故知又同非義一也問不染汙法如何成雜解云一由第七一云前後間雜若爾第六七平等智等前後有惑應亦成雜解云不爾有漏順染無漏即非有云心王遍行與惑相應名為相雜得斷煩惱心等離染名為斷雜此不應理見道亦斷相應縛故如何乃言離縛斷法唯在修耶第二說好若以第七名能雜者離欲九品未得無學欲界善等不應名斷第七能雜猶未斷故若准此理離欲之時但能斷說之為斷非雜煩惱若爾生上聖者不斷雜煩惱亦自然無如見道煩惱修惑緣縛未盡亦名為斷已永不生以身體性強說之為斷其善等法類亦應然緣惑強故說不斷雜亦名為斷既爾如何由之成有漏思之問有漏善法無覆無記見道煩惱豈不然緣何故不說解云亦緣然未盡故所以不說今據盡處所以唯修問見道不善斷法依何說斷解云有二種一因三果喪斷謂三惡趣果名見道斷由因惑業無果永不生故二果喪因已斷謂三惡趣別報善業亦見道斷所依總報果無因隨正故無相定等引發煩惱見位因巳果隨見斷半擇迦等多由分別煩惱正發故入見道時因正果滅也問如生七者於色無色及第八有皆不受生何故不說為不生斷解云然有預流作不還已後生彼故今通作論不還欲界一切色無色不定故問何故大論總初十二支以辨三苦緣起經生老死十地第八十二支中三苦分三解云大論約遍通說諸支緣起以因位種子告相陰故顯相說果中在十地第八隨相增也問緣起經中何故以生顯於行苦解云造作名行生是起義造作相增說為行苦餘准可知十地第八初無明等名行苦者即能所引同是因位造作業增當果本故說名行苦雖觸受二亦是引因苦苦義增不說為行苦苦所攝謂受支體多起苦受諸支苦苦唯受支增以彼觸支與受相順三十苦苦攝欲顯諸受無非苦者為令生厭故說觸受總為苦苦餘支壞苦雖於死位苦苦亦增與老相近故壞苦攝死是滅無與老相順故老死支俱名壞苦於當果位生本為壞故生老死皆壞苦攝受取有三為能生因近能親生生老死故從彼所生亦壞苦攝又此愛等五能所生攝於熟變時此苦方起變壞名壞苦故皆壞苦攝對法論云於當果位有能所生由熟變故說名為果壞苦亦爾皆隨相增非為實理也問苦諦是果果義即有漏皆苦集諦是因因義有漏皆集解云不然有漏無非苦有漏逼迫皆苦諦招報方名業非諸有漏皆招報此如決擇五十五說問道諦非有漏支非道諦說加行資糧道諦攝有支亦應道諦攝解云順道名為道二道道諦攝順生死法名緣起道諦非緣起二道尅性亦非道諦今約尅性論故支非道諦二道有漏故又二道位有漏二道是緣起支非道諦攝又無漏二道種是道諦攝非緣起支名據一義亦不相違也問雜修靜慮如何修如資下故業耶解云於第四定上上品修以無漏定與有漏定間雜起之以無漏定資有漏定由此相重資下故業能感上生非如薩婆多即以熏禪業生五淨居彼宗聖者亦造總業大乘宗中聖者不造新業由此聖者上資下故業也問變易生死之因無漏業是何無漏解云後得智除無分別及此所引後得智及此加行唯取緣事後得智也問前七三果人七地已前受變易不解云得受若爾何故勝鬘經中但言羅漢獨覺自在菩薩而不言有三果人解云彼經就勝而說實非盡理故以羅漢獨覺不定性者決定受故八地已上亦決定故七地已前或受或不受彼經約勝定故作如是說若不爾者何故佛地第二說聲聞乘或除七生或除一生或除上界處處一生即前三果雖諸煩惱所順閏分順得非擇滅而由願力受變易生三無數劫修菩提因無有過失乃至廣說又大論第八十云復次回向菩提聲聞或於學位即能棄捨或無學位方能棄捨准此等文前三果人定受變易也又若七地已前無變易者何故此論第七云有從初地即能永伏一切煩惱一切地中如何羅漢得入滅定又西方諸師七地已前許受變易謂諸異生定性二乘四果有唯變易非分段二乘無學不定種性已回心趣大者八地已上菩薩有二種俱者前三果人不定性者七地已前由得自在故留煩惱障有漏業減名分段即粗易知易若由無漏業同所知障緣所減者名變易細難知故由此義故七地已前代諸有情受三塗苦是實身受易可得知若八地已去即是化身大智度云地捨蟲身者捨分段也若依此釋七地已前乃前三果二受變易彼經據定且說無學自在菩薩也問變易身非二乘等所知境界者回心二乘得見知不解云大論八十說云非天眼境此說非二乘等境彼文意說望定性二乘及不定性未回心者雖有天眼亦不能見故此論云異性生二乘所不能見問二乘回趣者初受變易定性二乘得見以不解云不見聖說下眼不見上故地位同者得牙相見上得見下理下致疑又解以同類故下得見上問彼二乘人回心受變易依何定資有漏業因解未至中最上品以未得上根本定故問初果人有七生業未知回心受七生業盡方便受變易為發心即受解云不定若業定者受生方便得若不定者發心即受初果之人欲界九品總不進斷而受七生者及命終者名七生人若斷三品等而命終者名曰家家人若斷六品而命終者名曰一往來有二小生故若斷七品而命終者名一種子唯一小生故若於得初果身至第四果名為現槃已上五人於欲界得至究竟復有五人於上二界得第四果中生有行無行上流上流有二謂樂定慧上流入第四定修熏禪業初多剎那更牙起漸漸極少唯一剎那牙相間起唯取最後上品勝定以此為因生五淨天謂一回熏得生一天第二熏生第二天乃至第五生第五天若修無色者名為樂定此等五人皆於上界而得滅度問大論第八十云變易生死非天親眼境豈不定回心亦不見耶解云彼大意云決定種性及不定性未回心者即非彼境設有天眼亦不能見若回心受變易身皆悉能見設已回心未受彼身亦不能見以極細故設預流等回趣受彼身二能見以得勝身眼亦勝故然不許下見上非其境故又解云以同類故下能見也問周遍計度謂第六七識者第七如何遍緣境耶解云計而非遍由此應作四句有遍非計謂無漏識等有漏善心遍緣境故有計而非遍謂第七識有漏位俱者謂第六識起執位俱非者謂有漏五識及第八識聚問意識之言通六七者其義如何解云如小乘中業道之言思名業而非道貪等煩惱名道非業身語七支亦業二道雖此不同總名業道今此第七名意第六名意識六七合故隨其所應總名意識若爾亦應第六即有二遍二計餘之七識計而非遍通名遍計如六七合為名意識耶破云計度分別能遍計故者解云五八既無計度明無分別而不能起執攝論第四云意識是能遍計無邊行相而轉普於一切分別計度故名遍計若爾第七不能普計應非此收解云不爾三分別中計度分別能為七中有相分別非五八識有此能故故第七有此能故可是此收論云執有達無不俱起故者問約何位破解云此加行心順聖教作無我解故名為達無前師許有漏心皆有執法名有為執有如何執有與達無智而得俱起由此應知此有漏善心非有執也問何者三分別解云七十三說一我二法三用用者二用合說也五者七十三說一貪二嗔三合會四別離五拾隨與等又五者一無常計常二苦計樂三不淨計淨四無我計我五於諸相中遍計所計自相執問何者十分別攝論第四云一根本分別謂第八識二緣相分別謂色等識所緣相故三顯相分別謂眼等識棄所依根能顯相故四緣相變異分別謂老等相變易故五顯相變異分別六他引分別謂聞不正法類七不如理分別謂外道類八如理分別聞正法類九執著分別謂我見十散動分別問根本分別第八緣相分別色體非六七如何分別唯六七耶解云由於第八及色等法起分別故能分別心不離六七十一識等亦如是由於十一起分別非謂十一皆六七為體也十二者如十卷楞伽等四云一言語分別樂語言故二可知分別三相分別四義分別五實體分別六因分別七見分別八建立分別九生分別十不生分別十一和合分別十二縛不縛分別別緣十二處生分別亦是十三者無也十四者即十四不可記十五者亦無十六者十六異論等不繁述問十一識者何一身識謂五根二身者識謂第八身等識所依故三受者識謂第七第六能受所依故四所受識謂六境五能受識謂六識餘可知不繁述也又解云就第二釋三性初頌中文有二初科頌文後釋就釋有三初能遍計釋第一句次所遍計釋第二句第三遍計所執自性云何與依他起復有何別下釋下二句初問後答答中二師別釋初有義下釋所執自性即第三句後如是二分情有理無下釋第四句二所依體下釋依他起即第二頌初句依他起自性第二師釋中有四初二性別二引證三破前四結正頌言分別緣所生下釋第二句也問若諸染淨心心所法皆名分別能緣慮者染淨之色不相應等應非是識不能緣故解云彼不離識故亦是識若爾何故論云能緣慮故簡不緣耶解云意顯勝緣通染淨心皆名分別謂不簡緣即不是識色等雖不能緣由不離識故二識攝又解云分別者就能變強為名故作是說也問何故以常簡法共相以釋成就豈不苦無常等遍諸法上有實體耶解云苦無常等雖遍諸法無實體性無體無用名空無我非有實體共通諸法若爾觀心上現空無我等豈非有體解云不爾觀心上現隨觀心轉有空等相而無實體如前已說也問世親攝論第五云名義若體相稱即成相違此中安立名為依他起義為遍計所執豈不違七十四等初性不攝事耶解云論意有異大論初性無體不能攝事攝論意者以相見分等等餘二分此之四分是依他起由尋名故緣之起執成所遍計以名能詮依他故說彼名是依他所攝名隨所詮以配性也以義隨能計心橫計為有故初性攝相及分別總名為義名亦五中之名餘同前釋問若要證真方了俗者何故攝論先觀二性後入第三故云如是菩薩悟入意言似義相故悟入遍計所執性悟入唯識故悟入依他起性若已滅除意言聞法熏習種類唯識之想乃至爾時菩薩平等平等無分別智已得生起悟入圓成實性解云此文即見道悟入二性又頌云名事平為容其性應尋思於二亦當推唯量及唯量假實智觀無義唯有分別三彼無故此無是即入三性初半初性次半依他後一頌圓成實由此故知先入二性後證圓成解云攝論前文起觀起入以有漏觀心先觀二性後乃第三次頌俱是地前有漏觀心即加行位增上品忍中離能所取實未證見唯識論中約實證見亦不相違也解攝論初文但說三性前後不約證見頌中假想學觀未是實證唯識論初實證見故此前後思之問依他八喻何故如是次第解云謂能緣智不過有二謂凡及聖第八變化即聖所化雖功用化而易成就故由變化餘七即凡智境前七復二謂定及散前六散境第七定境定心澄淨如水現月前六復二謂能所詮前五所詮第六谷響即喻能詮前五復二光影即喻色無色界定地散境隨時別變前四喻散地散境長時總變前四復二謂即因果前三為因鏡像為果於前中三復為二種前二喻體夢即喻用體中復二約喻外器陽炎內身陽矢喻身能起業者幻事夢境喻所起業故此八種如是次第也問圓成實性遮諸共相謂無常等無常之理豈不常耶解云今取色等之上性滅之相此即無常又解云色心實法剎那生滅即此非常故亦所遮問七真如中流轉苦集謂有漏法並有生滅有何差別解云流轉據相苦集約用滅異謝因故有異也又解流轉是總苦集為別也問實相清淨二如何別解云實相真如通染淨法清淨唯取離垢真如又解實相據體清淨就相也問唯識正行可別俱親智故解云雖同是智據義不同攝境從心唯識所攝約觀真理正行所收問五種道皆正行不解云唯無漏智七十三云見道諸菩薩皆為性然此論云唯識通染淨者約所觀境非能觀智也又解唯識真如狹攝境從心是唯識觀觀之實性是唯識如苦道諦如寬通餘猶如苦空無常等十六行此唯道諦而非唯識唯識必道正行所收有漏道非唯十六心觀等此解為好問五法相攝釋正智離戲論無能所詮者何故五相中復得中有能詮相耶解云據所執能所詮故說彼非有五中離執能所詮故故亦有云問五相中二相屬相唯初性攝第四唯依他第五唯圓成者豈不相屬亦攝依他第四執著亦攝初性第五不執著有漏善心亦不起執何唯第三性解云據實為論實攝餘攝性且據相增故作此說且相屬中執實相屬初性所收執所依亦第二性攝或可相屬初性不執心中說二相屬通二性也第四執著能執之心可依他攝所執之相第一所收第五相中有漏心中亦有不起執者有通依他惑遍計所執心心所法無體能執惑通初性由此論中且約相顯故作此說顯揚十六云此五相中初及第二依三自相第三依遍計所執第四依依他起相第五依圓成實相亦與此同也問四種真實在何位地解云初即異生外道第二通四十心七方便等第三二乘聖位第四唯在大乘然後二境別者第三以四諦為境第四法空真如若爾二淨皆體如何名所行解云道諦亦是所行境故自證緣見宗所許故問何故大論初二真實唯攝依他辨中邊論第一真唯實初性攝第二真實三通性耶解云大論約凡夫所緣中邊通凡聖境故通三性又解大論世間所成中不唯約所執故通三法性中邊以凡夫所成多執故故唯初性攝理實依他假名初性又解我法二執為初真實一切世間共所執故問顯揚十四說八無常一剎那二相續三病四老五死六心七器八受用總是依他何故此論通三性耶總有八中初二遍一切法次二在內色次一唯在內心器及受用在外色無常解云無常有多義一者體常無故名無常此即初性生死之法有體性故第二所收圓成從詮第三所攝決論但約依他性義分八種也問三種無常為理為行解云所觀三性即為三理能觀之皆對此所現即為三行也問何故苦下四行名三集等不爾解云苦諦行寬通諸諦故故各分三苦與無常通集等故空及無我通四諦故又中邊之苦四除四例苦行各行分三餘三非除四例故不分三也問云何故名等起集解云等謂平等煩惱起業業起果報故也問聖達初性無如何成所緣緣以本無體非成緣故解云雖知彼無而現無影為親所緣故非無體若爾親緣影者所緣之境乃是依他何名初性解云約彼本質無故說為所執也若爾過未等境其體是無如何能起宿命生死智通能解云由現過未二世之影極似本質故起二通也若本質是有現影似彼可得名通本質既無影無所似通何所知若種過未相分現在彼過未相現影中無如何能了解云由過去境曾所經更熏成種故相續不斷在本識中能緣之識亦熏成種相續不斷由智澄淨依正彼種有彼相生言知彼境也應思問前第二破外道假依真事而立何故此云假依實因而施說故解云於勝論真事者謂外道所立實句共法是德句又真事是法自相性離名言及假智正破彼計不可依真而立假也今此所明自體共相之中有體之法名之為實非謂自相方名為實故依共相有體立假故前後不相違若爾何故說依他性似我法耶豈不有實我法為所似耶解云不爾前言依他似彼能執之心執實我法非似所執實我實法此還是依他似依他也就彼忘前所執故說之為實問三性四諦相攝四諦何故如是次第解云五十五云譬如重病病因病愈良醫又有差別謂如世間遭苦次第當知建立聖諦次第所以者何如諸世間曾所遭苦即於此處先發作意次於苦解脫後於解脫方便發起作意也問此四諦十六行幾是空行謂二即苦諦後二解云謂空無我幾是無願行謂六即苦諦前二及集諦四幾無相行謂滅諦一切幾清淨因所顯謂諦一切也
