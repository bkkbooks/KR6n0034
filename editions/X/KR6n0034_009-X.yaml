body:
  text: 就三無性頌三行分二初二頌答前後一頌辨唯識性此即從初能變至此廣前由假說我法等一頌半明性俗諦第三頌重顯前所說唯識真性前來至此明唯識境前二頌中初頌總答次頌別答釋論可知問真實真謂此二字欲何簡解云真簡有漏虗妄故知簡無漏變異法故又真簡初性如簡依他有生滅故也問只名真如有幾何稱解云對法第二有七名謂真如無我性空性無相實際勝義法界此論本頌但有二名謂勝義真如并釋論二名法界實際總有四名者也對法有七名者解云體恒無我無有改轉故名真如性離二我名無我由緣此故雜染空寂名之為空謂色乃至菩提諸相寂滅說名無相無倒究竟無倒所緣名為實際聖智所行名為義勝與此論同三乘妙法前依相故名為法界界者體也一切法之體也問唯識行位五頌第五頌唯明果位三劫之因所成前四因明何劫解云資粮加行初劫猶未證真見道頌全脩頌一分為第二劫修位第四頌一分為第三劫也問加行位離五畏不所謂不活畏惡名畏處眾怖畏解云不離若爾便違緣起經云內法異生不放逸者所起論不動行不說無明為緣唯此等文不生惡趣又攝論諸有世成增上品正見者雖經歷千生終不墮惡趣解云雖復不生然不離畏又未能離三種忘失一者失念於五境起顛倒二者失念於受生忘失前生事三者於所受持久作久說有所忘失問唯得知資糧加行二位總名勝解行位解云大論三十七云從初發心乃至未得清淨意樂是勝解行位論說清淨意樂是初地故又攝論方分為四位地前總明勝解行位也問此五位總以何法為體解云初位即十三住中種姓位中種姓住以一切佛法一切無漏種子為體起現行無漏以有漏趣向心故即通五蘊種子為體於五法中是正智攝三性中是依他圓成二性常無常漏無漏別故加行位即發心住以一切佛法無漏種子及有漏隨順一切現種功德為性起順起順趣心故然未證真如唯以有為為體第三四位即後十住俱以一切有為無功德為體證真如故今亦取一切未曾得世間功德順者為體三十二相等非皆無漏正智分別真如及相為體第五位即如來住以有為無為無漏功德為體佛地三身等下文自釋問四善根初地方便若初劫者初定方便應欲界應及質云若非初劫應非凡夫若未證真故非聖者既未證真如何弟子劫耶若爾何故對治十一四善根初劫滿已修習故非初劫者應及難云且如瓔珞經云等覺菩薩三大劫滿已百劫中修千三昧千劫學佛威儀萬劫他現成佛入大寂定是等覺菩薩言三大劫滿已四何故非佛地攝也又此論四善根中亦云順解脫分既圓滿已豈即非勝解行地耶故知初攝也問所經劫是何劫解云三十八說有二無數大劫一者日夜月等算數時節無量故說為無數劫二者即超上積時無數以為一切超過一切算數名無數大劫若說前劫即經無量無邊數方證菩提若說後初但三無數方證菩提不過此量如瓔珞經十卷八百里石淨居天衣拂盡名一僧祇劫若上上精進戒轉多中或有轉多大劫決定無轉無數大劫即釋迦菩薩謂超是中劫也謂刀兵等上下劫是也釋迦菩薩超九劫由翹足故或言更超十二劫報聞雪山偈故或超十二劫投身餓戰故多少不次須會問何故順解脫分體即是因順決擇分分即是體即非因順解云決擇是有為可體即體順體非一故解脫是無為故順因非體以體一故又解解脫者勝解數緣解解脫也脫苦名解脫因中即境為名乃名勝解在果出苦為因故名解脫若依此釋解脫即分名解脫分問華嚴第九十住品云第四生貴真佛子從諸賢聖正法生有無諸法無所著捨離生死出三界彼經第十又解十住初心菩薩頌云清淨妙法身應現種種形猶如大幻師所樂無不現或處為眾生究竟菩薩行或復現初生出故家行學道或現於樹下自然成正覺或處為眾生示現入泥洹如何此處言多住門外修菩薩行現神通等必依定故解云此第四住菩薩作十種觀法第七觀業第八觀果折伏現纏不依見道無明更道惡業令彼果起名捨生死出於三界定當能出於三界非此時已出也又此菩薩亦有少分依有漏定示現八相度脫有情以十住初發心住中分得十力雖有少定多住外門亦不違也問華嚴第十解十住菩薩中云除滅諸煩惱永盡無有餘無礙寂滅觀是即佛正法此則資糧位能滅煩惱如何此云未伏二取解云此依自分別起不共無明伏故餘因類煩惱亦伏不行緣起經說內法果生不共無明已伏故苦因耶教師所起者即不能伏彼緣強難伏故又解云此菩薩佛法助力能滅煩惱非十住位已能滅也故此論下云資糧道中於分別二取雖前伏滅未全伏故問有漏不執心中亦有能所取相見等豈皆伏滅耶解云不爾唯伏除彼能執二取也問煩惱障中何故不言我見為本而言薩迦耶見也解云若我見不攝我前若薩迦耶見即攝我所耶問薩迦耶見既為根本能生諸惑何故見道斷我執已餘惑猶在解云見道我見斷時餘分別惑二即隨斷修我未斷惑未已然二道所斷本末不同若見斷者由斷我見末惑隨忘若修斷者先末後本隨於何時九品之中先斷前八迷事煩惱第九品時方斷我見以難斷故問何故煩惱障中顯數可知障中而不顯耶解云為顯煩惱有多品數易了知故小乘共了知故明顯數所知障唯菩薩斷難了知故故不顯也又解云煩惱攝四住地故別顯數顯著別故所知唯一無明更不分也問二障既同體如何前後斷耶解云不定自有先斷煩惱不斷所知如二乘者九品所斷自在先斷所知不斷煩惱如大乘頓悟脩道位中自有二俱斷如菩薩見道及金剛心自在俱不斷如異生位此唯約種不說伏現問若所知障見疑等俱如何但說無明增故解云一者體增雖餘煩惱有俱不俱無明定有為此障故如二乘無覺不必有餘煩惱俱故二者用增迷一切境障一切智令不得佛果非如煩惱故三者難斷增要上上道方能斷故故名為增也問資糧位中伏二障中麤現行者麤細何別解云分別為麤俱生為細就分別中又有麤細或因自耶思惟起者行相深遠難可伏故至四善根方可能伏說此為細及以俱生並未能伏若麤若細二種隨眠由能對治正觀力未能伏滅初起正觀未勝順心不如四善根中能伏二細分別現種其俱生現種皆少亦能伏問此中伏是六行不解云不爾修習現觀勢力故爾菩薩不斷下界地惑起定生上故也問練磨心云菩提廣大深遠解云何義廣謂行解無邊大謂更無有上深即難測遠即時長也問資益己身後果初位名資糧加行亦求果善根資糧攝解云資糧望遠果遂獨名資糧加行見道親四善名加行又解初位亦加行抄遠加行故如論解也問資糧望遠果亦許加行收善根諸行大果因加行亦許資糧攝解云初位發心猛獨得名資糧加行遠近雖殊同起行故加行或可二同俱名資粮及加行故而此論文以初位中多住外門未伏二取望果猶遠不約加行俱名資糧也問尋思如實以何為體解云於三智中加行智為體此約推求相增故漏言慧若並相應增者信等五根五力為體若取俱有五薀故定俱有惑是色薀故攝無性云推求行見方便因相說名思了知假有實無所得決定行智方便果相名如實智由此故慧體增九十三云四尋思者五事中如理相應分別總攝四種即有唯有漏四如實智一切皆是正智所攝即唯無漏七十二說五事中相通有漏無漏二唯有漏名及分別二唯無漏謂真如正智真如是正智所緣名無漏非漏盡相義正智漏盡對治義故名無漏然今此位唯是有漏但約地前依教決定名如實智未能真證故唯有漏地上真證即是無漏也問尋思如實何故但言名不說句等耶解云此中說名二攝文文句故無性第六釋云此中名者謂色受等二攝名因名果名因者謂字字身多字身名果者謂句句身多句身皆是名果也問尋思如實地上解云有漏如實唯在地前若無漏者即在地上然七地已來猶未清淨有加行故要依尋思方起如實智八地已上離加行故第六識中常無漏故二取不起不依尋思而起實智故四十八解第八地云住此住中得無生法忍極清淨此復云何謂諸菩薩由四尋思於一切法正尋思已先時獲得四如實智如實了知一切諸法爾時一切耶分別執皆悉遠離於現法中隨順一切離染無生觀等乃至廣說此如實智始從勝解行住乃至加行有功用住未極清淨今此住中已極清淨是故說言無生法忍即如實智名無生法忍體然今實義尋思唯有漏唯加行心推求非根本後得智故如實智通有漏無漏道加行根本後得三智此唯忍可是果彼唯加行因七十三中唯依無漏說為無生忍且就勝說餘處通有漏者勝劣合說也問若忍有三品下即所取中順能取上即能取亦空即能取所取二種俱盡何故攝論解忍云入真義一分三摩地解云彼且約下忍即所取空一分也又對法第八云一分已入隨順三摩地彼論解云一分已入者於無所取一向忍解今依唯識即下忍一分隨順者於無能取隨順通達然非彼二論總相不分三品俱總言一分此分三品故差別也問二取之取為唯染心二通三性若染心者善心緣第八等應不作因能生真異熟非二取故若通三性者二取必與無明相應大論不說無明說通善性解云若執著故名為二取唯約染心若取境名取即通三性能引相分為取者即通三性故無有失問菩薩雙親安非安立可引真相二見道生二乘唯觀安立四諦應不引生真實見道生二解云據實二乘亦作生空非安立觀不雙觀略不說之問菩薩雙觀二空唯應非安立何須復作安立觀耶解云為欲引起遊觀無漏化度有情成就佛法降伏二乘故須二觀安立諦也問相縛在何識解云在六識由有第七為染根故今六識為相所物不自在了知如幻等若爾自證既不緣相應無縛解云二釋一曰不縛不緣相故不云有縛有漏攝故今言相縛者且約見分理實二通第三四分有解相者所緣皆名為相非唯相分由此二通三四分也然此縛名自有多義一四分相繫屬故之為縛此通有漏無漏後得智中有四分故經云所取能取纏等也二所緣相縛物能緣見分不自在了此唯有漏三性心中皆悉通有於此三性有漏心中有二種縛義一四分外內相屬故名纏縛二為所緣相拘名纏三若染污心中具有二義如前繫屬拘礙以是染心更加麤重縛若後得智中但有繫屬二無餘二能了所緣如幻等故非染心故如其次第無相及麤重縛也又解有漏三性心中皆有麤重縛有漏故問相縛麤重二縛何異解云大論第二云自識中所有有漏種子若煩惱品所攝名為麤重亦名隨眠若信等善法所有種子不名麤重亦非隨眠由此法生時所依自體唯有堪能非不堪能麤重所生自體性故佛說為行若對法第十六四麤重所知障麤重異熟品攝異熟麤重亦異熟品攝須受麤重攝一切有漏受即善受亦在其中勞倦麤重即威儀無記餘無記亦攝如此等文相相違非一有准五十八麤重縛即一切有漏法與有漏皆麤重故由相縛未斷有分相故其無堪任麤重縛亦未能斷顯揚十六云由相麤重二縛執二自性謂執依他及訶所執若解二縛於二自性正無所得及無所見彼論唯約執心解縛其非執心彼即不說據增故也彼卷又云此依他性以相及麤重縛為體云何說為依他由此二種更互為緣而得生故謂相為緣起麤重麤重為緣生相縛相縛即約現行相麤重約種子語論實彼體雖復皆同然今彼文以相為現行麤重為種子有漏相未遣二障種子不除不爾如何此中言相未滅麤重為種子有漏執二性應勘彼文相此中相縛者一切有漏不安隱性與大論五十八有漏麤重同初地分得第八地中第六識全得一向不起第七分無五八全麤重隨應佛地令無間豈不二乘亦觀生空非安立諦何故此云非如二乘唯觀安立解云理實亦觀為顯彼劣不說脩之問前三無色脩未知當知根為唯約無漏亦通有漏耶解云無漏者可知若有漏者謂有發心已去依有漏心生得上定依三無色地有漏心熏習成種入見道時熏脩此種在見道位名為此根非謂依三無色得起見道此即許發心已去所有善法初根所攝也問若上界猒心非勝惡趣慧心非勝不得起善根者上界聖人如何離欲解云無猒見道三界分別惑及三惡趣等猒心名無非有漏欣上猒下及猒自地欣生上心入見道時必總猒三界一切法總緣諦方能入故此一向據入現觀為諦論非約修道惑及異生世俗猒心為論也故云餘界猒心非勝餘趣慧心非勝故不能入見道顯揚十六頌云極欣非上二唯欲界人天佛出世現觀解云惡趣苦受極故不得入定起現觀上二界猒劣亦不入故唯欲人天二趣有佛出世能起現觀未決亦得有佛出世攝故無佛世無說法者令生厭心不得入也若爾有佛法世發心法滅後方成熟久已脩訖得入現觀不解云准文不得無此類者故亦解又得先修根熟故也問十六心名見相道豈不真後而起名相耶解云實爾施設真已有此相狀若爾見道前應不起此十六諦以來證此無此相故解云雖未證真學觀諦理今觀純熟亦起此觀若爾加行位中應相見道解云以猶有漏未能親起此相故不得名又解云亦可得名以有漏故在加行名故論諸中多不說也此之所起皆為所立言教為他宣說也問三心相見道道中第三心斷障以不若斷者應不名解脫若不斷者云何論云能除一切分別隨眠解云理實不斷依真假說若爾真見道中二障頓斷第三心如何說遍解云理實第三實不斷假說遍言大論五十五有三復次辨三心十六心有差別者問三心見道第三心既遍遣有情法假此即斷障如何法真見道解脫道耶解云真中解脫雖不斷障能斷麤重決斷麤重故言遍遣問准何得不道除上品惑解云大論五十五云問何等名耎善根答諸不定地所有善根或在定地而能對治上品煩惱問何等名中品善根答若在定地世間善根或能對治中品煩惱問何等名上品善根答謂出世間所有善根或能對治下品煩惱又諸善法或由加行力或由串習力或由自性力或由清淨力當知或上品問煩惱之何為上中下品答之五十五云云何煩惱建立耎中上品答最後所斷名耎品中間所斷名中品最初所斷名上品後由六因諸煩惱成上品一婬欲所生煩惱性多中上品二串習所生煩惱性多上品三安足處煩惱謂根熟者煩惱性多上品四不可說煩惱謂無涅槃法者性多上品五非處加行煩惱謂於尊重福田等所性多上品六有業煩惱謂發業者性上品也問下地入見道者先觀下地若等四諦已復觀上界於上界入見道者先上後下以不解云若入見道唯欲非上故無先上却觀下矣又解若望色界迴心亦先觀上命約定姓說先觀下問若第七地純無相觀得相續者第八識或應行何不即捨執藏之義解云依多分說故云相續理實少分有間斷時故問後得智三說二分中初說俱無如何佛後得有說法法等耶解云此意云佛不說法但由有情識上文義相生已十五界唯有漏問煗等如何不名廣分別解云煗頂二位唯觀所取忍三品下即所取中上觀能取第一法位雖復雙印時促又非證真故非現觀思能種種思惟觀察名廣分別若爾此位堂非觀一切法無我等耶解云出惟觀無我隨觀何境必有分限又解三乘通說二乘此位唯觀四諦問耎等善根何非現觀解云不能廣分別故若約二乘觀下上諦境七周減緣者下上二界皆具四諦遍具觀下上界四諦總緣八諦第一遍即除上道諦第二即除下道第三除上滅第四除滅第五除上集第六除下集第七除上苦唯被欲界苦具作四行更作三周減行中煩惱已前通觀一切法皆無我等乃至虗空非擇滅等皆無我故若耎等位中分觀諦中不廣分別也若至忍位三周減行第一除無我第二除空第三除無常第四唯作苦行所以爾者為欲趣入苦法忍故唯作苦行然於中上二忍苦思苦智二心同一行相皆作苦行也問何位方減緣諦及減行解云聖望上忍位已前耎頂位猶具緣之問依此論第四現觀根本後得二智為體三心見道後得智攝應緣安立何以論云緣非安立解云三心對真安立所攝若對十六非安立收所望別故五十五約十現觀中真現觀以三心為其體性問若爾對法釋真並以世俗智為體解云對法意以真現觀中增長彼種故作此說非以彼體現觀所攝又解瑜伽顯揚唯據菩薩故唯無別智對法論意約三乘人故取世俗若行修唯出世若得修通世俗也問六與十種如何相攝解云六中慧觀攝十中法義二種彼思現觀雖言思相應慧為性此約方便為名據實即以決擇分善為住或思不攝義現觀以唯決擇分故前釋為勝六十信觀攝彼十中寶現觀也彼舉所信故作是說六中戒觀攝十不行六中智諦現觀攝十中真全後一分以六中第四五以後得為其性故六中第五唯攝後中緣安立諦一分義並能攝彼世俗智六中究竟攝十中四究竟一名六拾同有若聲聞有名聲聞獨覺菩薩准此應知問幾有漏幾無漏解云六中思十中法義尅性有漏以是地前故名據所生無漏方便相從通亦無漏六中信十中寶通漏無漏以彼信通二種故六中戒十中不行唯無漏以用聖所愛戒為性故六中智諦十中真觀一向無漏根本後得為體故六中邊觀十中後觀通漏無漏緣安立諦邊無漏所攝通世俗故智攝有漏六中究竟十中究竟及聲聞等三通漏無漏以用前五及以前七為具其性故別別行相不及於思種種思惟觀察等也問得二見道於多百門自在者何者為多百門解云大論三十七說一剎那頓證百三摩地以淨天眼見百佛國見百如來動百世界身亦能往彼佛世界放大光明等化為百類普令他見成熟百種所化有情若欲留命得百劫住見前後際百劫中事智見能入百法門化作百身皆能現百菩薩眷屬即於十百自在名百門也問云何證得二種轉依廣何處文解云謂廣前修習位一頌此廣中云何謂十地中修十勝行廣前頌云無得不思議是出世間智斷十重障廣前第三句捨二麤重證十真如廣前便證得轉依也問何故十度五地修禪施或修中三地得定解云問後得智能斷煩惱為是緣理後得智為緣事得後耶解云緣離後得智論云惟不親證二空真理故智緣理智也依攝論第七度相有六一空真理故知緣理若菩提心為所依二事最勝三由處謂一切有情四善根最勝謂分別智所攝受五迴向菩提六清淨最勝謂離二障解云彼論六相與此七同此論第一種性攝論第一菩提心依彼事最勝此論事業因謂內外所應施物餘五大義同問精進有三攝論三種一被甲二加行三無怯弱無退轉無喜足物雖三句為第三句而無利樂唯識三種初一共同第二攝善第三利樂解云攝論意者唯約自利故無利樂攝論五句攝善方盡唯識三中約二約自利行攝善總足第三利樂然利樂門故異攝論問後四度既是後得智攝如何除斷彼所知障必根本故解云由後得智修方便舉助前六度生根本智能除其障非後得智能斷法執又解云後得亦斷迷事障故若爾但斷迷事障得成度解云正體斷迷理所知後得斷其迷事依後得智四度緣有情作方便善行等也思之擇願度依大論三十五有五大願一發心願謂諸發菩薩心二受生願願於當來隨生諸善趣饒益有情三所行願願能無倒思釋諸法願於境界修習無量等殊勝功德四所願願當來攝受一切菩提功德若總若別五大願此說正願所生此復有十種一者願於未來以一切種上妙供具供養無邊諸佛二者願於當來攝受防護諸佛正法令無斷絕三者願於當來從都史多天來成道乃至入涅槃四者願於當來具行一切菩提正行五者願於當來普眼成熟一切有情六者願於當來一切世界皆能示現七者願於當來普眼淨修一切佛之八者願於當來一切菩薩同一意樂趣入大乘九者願於當來所有加行皆不唐捐十者願於當來速證無上正等菩提解云此中初一是求菩提願後四利樂他願釋波羅蜜總名依對法十一十二最勝相應者一廣大最勝為利生故四無盡最勝迴向大菩提究竟無盡故五無間最勝自他平等令他速圓滿施等故六無難最勝隨喜他人施等令自行便速圓滿故七大自在最勝由得虗空藏等定令布施速圓滿故八攝受最勝無分別智所攝受故九發起最勝謂解行地中上品忍位所行施等證得最勝初地所行施等十一等流最勝後八地中所行施等十二圓滿最勝謂第十地及如來地所有施等為菩薩圓滿如來圓滿已如闕一種非波羅蜜多又云最勝所作所至故名波羅蜜多波羅是所至義或所作義蜜多是能作義能至義又云到所知彼岸故名波羅蜜多安住佛性故波羅所知彼岸義蜜多是至退有斷乃至究竟座菩提座是名廣大又諸菩薩修行施等時於施所攝諸有情所生大歡喜勝定施者是名歡喜又諸菩薩修行施時觀施所攝一切有情於我有恩不見己身於彼有恩彼資助成菩提故是恩德又諸菩薩修行施時雖施財等而不希報恩及當來異熟是名無染又諸菩薩修行施時以己所修廣大施聚所得異熟施諸有情下力己身又以此福共諸有情迴向菩提是名廣如善巧廣如雜集第十二說修餘五度義准下知問三無漏故根所者種子歷從辨三定一種子者加行等三智種子例亦應然何故三皆種子名別故現約從中云八地已現二種若三轉齊者八地已上應不得有加行種子轉加行種成任運故解云未知當知根約相見道無漏種子歷位分三加行種子唯是有漏所以八地已上加行種子不可轉成無漏種子八地已上有漏無漏各各不同種通三也問成到彼岸謂以法空智導二乘迴向趣但證證空如何論云二乘地前通無漏猶未能見施物等空解云二乘地前惟無法空以為得生空觀能所施財物非我所故所以諸度言通無漏又解無學迴心地前生空後得觀位學法空觀法執不起亦得說為波羅蜜多後得生空是無漏故於圓滿度復更修六然對法卷也依中邊下卷十度十二最勝一廣大二長時三依處四無盡五無間六無難七自在八攝受九發起十至得十一等流十二究竟初廣大者謂不求世間自在廣大富樂故二長行勝者謂經三無數劫熏修成故三依處者普為利樂諸有情故四無盡者迴向無上喜無窮盡故五無間者由得自他平等勝解故六無難者於他所修諸度深生隨喜令自施等速圓滿故七自在者由勝定力令修十度速圓滿故八攝受者無分別者所攝受故九發起者勝解行地最上品忍所發起故十至得者謂在極喜地十一等流者在次八地十二究竟者第十地及以佛地因果滿廣大長時及依處無盡無間與無難自在攝受並攝受發起至得等流究竟滿有依中邊下卷修習正行中云有差別無差別正行此云於十地中隨一增上餘行分修習名為差別一一地中俱修一切名無差別即當純雜二種修已無猒廣大歡喜因德無染善存樂修有六修一無厭意樂者謂諸菩薩於一有情剎那剎那殑伽沙等世界滿中七寶以用布施又以殑伽沙等身命布施經爾所劫如是於一切有情行如是施時皆令彼於無上菩提位速得成熟菩薩施心猶不厭足廣大意樂者修行施時展轉相續無一剎那有五修與攝論稍為彼修五種一現起加行二勝解三作意四方便善巧五成所作事解云現起加行即是對法任持修由自等四種力故加行起修也對法作意修中有四初勝作意即攝論第二勝解修也餘愛味隨喜欣樂等三作意即為攝論中第三作意修對法第三意樂修六修總是攝論作意修攝故彼第七云又作意修者謂修六種意樂所攝受重隨喜欣樂三也第四第五二論相同對法第五自在修習有三謂身行法說三種自在解云修習為求佛果三種自在修習諸度即為三種自在為依修諸度也若依攝論與對法異謂諸得果位更起六度任運自在利樂有情名成所作事修故彼云謂諸如來任運佛事無有休息於其圓滿波羅蜜多復更修習六到彼岸雜集十二六度得五果永斷所除是離繫果攝受自他是士用果於當來世增勝生起是等流果大菩提是增上果大財等是異熟果會釋如論然七十八等流果有六大財善趣無死心懷為眾生主無惱害大拔業皆約異熟果中說非不得餘又攝論富貴大小大明唐者此三異熟果廣大業塵垢薄知五明處此三但就增上果說又菩薩地釋六度中一一皆言得大菩提此亦唯約增上果說由此經論得果增減如理知之問如何定學作業解云大論三十七云神境智通品類差別有十八種一者振動二者成然三者說中四者亦現五者轉變六者往來七者卷八者舒九者眾像入身十者同類往趣十一者顯十二者密十三者所作十四者制他神通十五者能施辨才十六者能施憶念十七者能施安樂十八者放大光明如是等類振動者諸佛菩薩得定自在心調第故普能振動寺舘舍宅邑城廓國土世界乃至無量世界熾燃者諸佛菩薩定自在故能從其身身上出火身下出水舉身洞然遍諸身分出種種焰紅白紫綠波眼迦色等流布者依定自在流布光明遍滿一切寺舘舍宅乃至世界示現者如其所樂示彼一切諸來眾會沙門婆羅門乃至八部乃至諸佛國土說法等事轉變者謂佛菩薩依定自在若於其地起水勝解即令成水乃至火風隨於一大起餘勝解准此應知乃至於一切起一勝解皆能轉變華鬘七寶等也往來者隨其所樂於諸墻壁等中縀身往來無有障礙乃至往梵世究竟天或復無量三千世界皆無障礙卷舒者謂佛菩薩能卷一切雪山王等如一微舒一微塵令如一切雪山王等也眾像入身者依定自在能以種種現前大眾及以一切村邑聚落諸山大地等內己身中令諸大眾各各自知入其身中同類往趣有或能往趣剎帝利眾同其色類如彼形量似彼言音如是往趣波羅門長者等眾乃至二十八天眾皆同彼類也隱顯者於大眾前百度千度或過於是隱沒自身復令顯顯也所作自在者普於一切諸有情界往來行住悟轉等事皆悉自在制他神通者所現神通如其所欲令欲事成并諸大菩薩亦能制伏所位聖者所有神通能施辨才者若諸有情辨才窮盡能與辨才能施憶念者若諸有情於法忘矣於與憶念者能施安樂者說正法時與聽法者饒益身心輕安之樂令離諸益專心聽法又令諸界互違損害非人所行灾厲疾疫皆悉息滅放大光明者或有一光往十方面無量無數諸世界中令惡趣等一切有情息彼眾苦或有一光往諸天界令大威德天龍等苑光覺悟皆來集會或有一光往才無量無數諸菩薩光覺悟皆來集會振動熾燃及流布示現轉變並往來卷舒故眾像入身中同類往趣並隱顯所作自在伏地通能施辨境并安樂放大光明為十八問異生性何性攝解云依煩惱種邊得加染法約所知障邊乃名無記通二義故由此對法自性無記五根三塵命根等不說異生性六十六等五無記中不言異生性命根唯依第八現種故唯自性若爾名句通依三性聲何故以唯無記解云依大乘示聲唯無記名隨所依也三十九度次第三種一由對治有治有有六一堅二惡行三於有情起根逼惱四懈怠五散亂六愚痴如是六法能諦喜六度妙行二生起可知三由異熟果一由感外財法寶無不圓滿二由於得善趣心身若人若天三於善妙行常無厭倦堪忍他惱不惱於他四普於一切所作業堅固勇猛五為性離垢染其心自在轉有所堪能六於一切義其慧廣大聰敏利亦以六度攝三學者前四攝戒第五攝定第六攝慧問二真見道為是總緣智斷惑為是別緣智能斷設爾何失二俱有告若總緣智非自相智比量所攝如何斷能若別相能斷者何故對法說云問何等作意能斷耶答總緣作意觀一切法皆無我性能斷煩惱師子覺釋云總緣作意者令緣一切法共相作作意解云然佛地第六三師別釋初云二量依散心位不說定心若在定心緣一切相皆現量攝由此總緣智亦現量攝由此亦能斷惑無失二云定心唯緣自相然由共相方便所引緣謂共相所顯理者就方便說名知共相不如是者名知自相由此道理或說真如名實空無我諸法共相或說真如二空所顯非是共相由此義故對法等說緣共相智能斷惑者依方便說理實自相觀智方能道斷之如實義者自共相二自有二門一依二量以辨自共現量得者名自相比量得者名共相此通一切法二依諸法以明自共色等自相不相離亂名為自相若無著等遍在有為名為共相真如既是諸法通性名為共相然此真如自相離相名為自相對法等說共相作意能斷惑者如真如遍通諸法之理名為共相然現量智離分別故正證真如實自相故名緣自相由觀證理能斷惑故由此諸論或云共相智能斷煩惱或說智自相智能斷惑者互不相違也問十地位不斷煩惱如何解脫道中說斷麤重解云修道位斷麤重者非離斷所知外別起無間漏道斷煩惱麤重無始已來與所知障所知為本由無間道本障斷故其末煩惱麤重與所知障解脫道捨故無別斷煩惱事也問若爾二乘斷定障亦不斷種間道生既無麤何須復起解脫道耶解云惟解脫道無麤重可斷亦不證無為得自在故名解脫道也問異生諦通依於二障何故通難云雖有惡趣業等而今且說能起煩惱解云以與煩惱俱總說煩惱名也或可業唯煩惱也又解云取所知障惟非縛法毀責之名也問執著我法愚中亦有非愚以不解云亦有如貪見慢等體非是愚愚之類故亦名愚也問初障二愚為種為現解云唯現故下論釋彼麤重言顯彼二障種故知二愚是現非種也又前二愚通現及種所以知者第二復次釋麤重言或二所起無堪任性如入二定說斷苦根非種也二邪行障十地云耶行於眾生身等鄣世親論云諸有情身等耶行障大意同也此邪行障發舉感生以不解云不發非如煩惱是縛法故問法執既通不善與煩惱煩惱障同體起故如何不能發業招生解云不由不善即能感果如諸心王亦通不善體非縛法法執但由煩惱俱故令成不善非性是縛也今以實論無覆無記故無有失問若爾何故名種大業趣愚解云今言趣者毀責名也非能取趣果故名趣以障淨成名惡趣也問初地悞犯是不善若爾何故深密云地上菩薩起或不為過失解云以了知覺察故不為過失非諸煩惱性非染法問悞犯或愚三聚之中化何或耶解云多分攝善法饒益有情以於利生不欲行障後方斷既不利生不增善法也律儀定無定地上起惑亦非不善起悞犯耶又解云容有律儀起惑利生可非不善悞犯身語是過所收廣嚴論云有四種相一堅相且約施門應言除障二與智合無分別智導故三滿願相稱求者意故四成生相成就有情故問麤相現行障體是所知何故十地論名微細煩惱障解云由與煩惱體起故得彼名也又解過失重故得煩惱名也問第四地障云細相煩惱障不與第七俱以彼第七望無漏觀性相違故第六意識空不與彼無漏相違耶解云第七或惡起無漏方始後違令云不行第六識或有漏善心且不得起為簡彼彼說無漏方始不行也問四諦緣生更互相攝苦集相收何故執四諦染淨說為麤相緣起生滅名為細相解云理言緣生苦集諦攝應無麤細四諦是聲聞觀緣生是中根觀約能觀者故說麤細問第七地純無漏相觀即是無漏相續如何得不於無相中加行障諸加行心皆有漏故解云相續起多間斷時少故云純續理實間斷起有漏心故有加行間第四地微細煩惱現行障云身見等言為但等取定性法二愛為更有餘解云非唯二愛身見俱生貪慢及以遍見等隨煩惱皆此所障問分別身見名為上品俱生為下品何者為十解云第六識俱獨頭貪等通不善故名為中品此唯無記故名下品惑下唯約分別我見相對說為下說無中品於程無違問二見身第四地斷相應貪等此地隨三何故七地以來由有現起貪愛分段身解云迷事貪等起亦無失問第八地障能障非現相及應名相中加行障何故但名於無相中作加行障耶解云理實應爾今但於無相觀中任運起現相及土即得自在故今但就能現相智是根本故故言於無相中作加行障也問何故身見能障道品解云由有身見不能觀身為不淨等障念處等也問第八地已得無功用無相觀相續現前何故利他而不欲行樂信己利解云得無相觀相續無著寂滅故問第九地得四無礙解其相如何答依十地論第十一說第九地菩薩中以法無礙智知諸法自相義無礙智知諸法差別相以調無礙智知不壞說諸法以樂說無礙智知諸法次第不斷說文又解第一知法無體性第二知法生滅相第三知法假名而不斷假名法說第四知隨假名不壞無邊法說又解第一知法差別第二知義差別第三隨言音而為說法第四隨所樂解而為說法彼有多釋不能廣引二辨才自在辨謂七辨一迅辨二應辨三捷辨四無疎謬辨五無斷盡辨六凡所演說豐義味辨第七一切世間最勝妙辯
