body:
  text: 唯識體即是教故持業釋釋或此本論是成立佛經唯識理之教名成唯識即依主釋以末從本亦有二釋末論遠詮佛經亦有持業及以依主亦無有失二明宗體先宗者略有五種一隨機説宗二部別説宗三約別明宗四約時辨宗五約四悉檀辨宗初者如八萬四千法門隨衆生病濟拔教化或説六度四攝如對多貪教化不淨等其類非一第二部別説宗者如諸教所詮各異如法華一乘為宗涅槃佛性為宗雖明餘義然非正明猶以正明以之為宗第三者謂約三藏以判或就大小以取執言隨藏四謂約時者如深密等説三時教等五四悉檀者依智度論第一有此四種理悉檀者翻為義宗四者一世界二各人為人三對治法門四第一義前三為俗後一為真世界者謂世俗如説五種陰成衆生若林成捨等各各者如經或説有我或説無我為除斷見反以我見如次應知三所對根機差別也即即能治病有勝功能名為對治第四唯明真如理也問瑜伽六十四四重二諦四悉檀等如何相攝解云彼論前三亦世俗攝彼處二空真如從詮相説即智度論第三對治也此論五種宗中如次配尋可知問楞伽云不説墮文字法者為約遍計所執文字為約依他解云此約遍計所執文字能詮所詮決定相屬言所論法定屬能詮執名為墮也五種性義四門分別一釋名二辨體三文證四會聖教釋名者先通後別言五者是數種姓名類義族義即六釋中帶數釋也言別名者謂聲聞乃至無種性聲聞者因聲悟道故名聲聞此即聲聞此種姓依主釋也觀緣起法而得悟道故名緣覺菩提種姓者依佛地論三釋謂求菩提教他有情此即上求菩提下度有情故名菩提種姓依主不異於前不定者謂即身中具有三乘種姓互相望成四句一小對中唯有二姓二以對小大三以中對大四具有三姓然四句中唯取第四成不定性所以亦者言不定回心定成正覺內彼前三無常成義故攝大乘云為引攝一類及任持所餘由不定種姓故佛説一乘問若爾只應唯除中小相對以小及中以相對大何故不具取三解云若論不定必須三句既有小機名有中性故法華云無二亦無三而不別言無中無下由具三種隨緣悟入故云不定亦依主釋也又解以小及中對大姓者亦成不定唯此等釋取三句成不定後解為勝無種姓者謂即身中無有三乘種子唯有有漏善等法種於善惡輪趣受生名無種性也然五種總是依假者且如聲聞亦非取假者總依五蘊諸法而立而言聲聞廢總談別説耳聲聞故云聲聞餘聞假者隨義別立也如理應思二辨體思者三乘及不定種姓總為無漏種子以為其體若百法中尅性唯慧若約相應俱有如理應思第五性者無種性言非是無漏如説無明別有真體此亦應然即以所依有漏五蘊為體或更釋二障種子為體以彼障法相對立故若準此釋亦慧為體別性相流如何前若論五種性者性即種子者即五五蘊之上建立假人此即通取種及五蘊以為體也三取文證如瑜伽第二及菩薩地等如下應知如瑜伽第二云復次一切種子識若般涅槃法者一切種子皆悉具足若不般涅槃法者便闕三種菩提種子又三十云謂所成就補特伽羅略有四種一者住聲聞種性於聲聞乘應可成就補特伽羅三者住佛姓種於無上乘應可成就補特伽羅四住無種姓於往善趣應可成就補特伽羅諸佛菩薩於此四事應當成就又菩薩他世五卷云住無種姓補特伽無種姓故雖有發心及行加行而為依止定不堪任無上正等菩提準此等文三乘已外別有無性解深密説三時教者依有種姓故作是説舊善戒經亦同此人心成就略有四種有聲聞姓以聲聞乘而成就之有緣覺性以緣覺乘而成就之有佛種姓以無上乘而成就之無種姓者則以善趣而成就之如是四人諸佛菩薩以四事而成就之大論三十七亦同第四會教者法華經云十方世界唯有一乘法無二亦無三除佛方便説若有三乘定性如何會耶解云此對不定種姓故作此説又不增不減經云衆生界不增減不生滅知無有畢竟入涅槃者若有定姓入無餘依彼經應言衆減解云彼經約衆生界理性而言真如之理無增減故又解彼云衆生界不增減而不説云衆生不增減界言總説衆生界際非約衆生而説故不相違若有無性者涅槃云何言有心者成佛能解云此約小分而説又解此約有大乘無漏及不定姓無漏心種而言不説云一切有心者皆得成佛經意祕密故不相違就第一所敬田中有心者二初辨所説敬分濟後釋論文所敬分齊者三藏解云依此文中略作四門廣開十義四門一謂人法二謂菩提涅槃三三寶四三寶及初門中人言十義者前之三門各有三釋第四門中唯有一釋總合為十初門三釋者言唯敬滿分淨人作敬識性今舉識生顯能證人內第三句云釋彼説故此則依於觀智及餘蘊上建立假者以之為人不取實法二云唯敬識性不敬於人雖舉二人顯所證法也三云通敬人法俱是最勝前可敬故問人謂假者法即識性人之所依能觀之智人法二種何所攝耶釋云此有二解一云人攝非所證理理假者依故二云法攝內非假者是所得故第二門中有三釋者一云此敬涅槃滿分淨言顯能證智二云但敬涅槃説識性即是所證涅槃舉能證時有滿分淨顯所證滅有分圓滿三云菩提涅槃二種俱敬所得所證並殊勝故第三門三釋者一云俱敬佛僧非敬法寶頌中説言滿分淨故惟舉於法表人所證非正所敬也二云俱敬於法而非佛僧唯識性言是所證故舉滿分淨欲顯法寶唯識性理有能證者因早位殊非謂佛僧正所敬三云此頌悲具敬三寶並是最勝可歸敬故問佛僧二寶並皆是人即第一門有何差別釋云初門中人於實法上假立於人即假者目之為人此佛僧並取實法法身真如二身正智以為佛體僧名和合即理實二和以為僧體問若取理事和合以為僧體即應非敬解云復是假成所敬如擇滅涅槃即第二問中所敬也第四門唯有一釋謂敬三寶及初門中唯取於人為第十釋此即第三門全第一門中一分也就述造云本論中三師別釋文即為三初釋中略為有二種一明異生行謂迷謬二空二聖人行謂生解為斷已下總是第二二者一因謂迷謬二空二即果位謂生解斷障也又解因位即是迷謬二空生解斷除果位即是菩提涅槃也復有二種三所謂生解斷果為三二約三性以為迷謬二空於生正解顯所執性生解為斷二重障者已下明遣染分依他復明二早證圓成實復有二四初四即是五道之為四地前二位合之為一名勝解行位見修無覺如為三次四約六轉依以亦為四地前生解即是損力益能轉生解斷障即通達轉由我法執已下釋修習轉復證二果圓滿轉證大涅槃非下劣轉也復有二五初約五位迷謬二空種姓住生正解故即是第二勝解行住生解斷障清淨增上意樂住內我法執下明正行住後二勝果明究竟住次五即仁王五忍初生正解地前伏忍生解斷障第二信忍初二三地四五六地即是順忍七八九地即無生忍十地佛地即寂滅忍故分為五種如此多種不同其中取捨忍便思之為於二空此二迷謬境問九總説空為是我法為有為無解云空無我法故名為空此即空性夫論無我略有四種一外道所執實我計常遍等自體是無故云無我故菩薩地云有為無為名為有我及我所名為無二者於苦諦法執色等蘊以之為我可唯有蘊而無有我此則名為別無我理此據諸有漏法中無所執實我故下論云別空非我屬苦諦故如於中無有馬等問與外道執常遍之我有何差別解云彼約我體則無名名為無我此就唯蘊而無有我故有異也三者通空無我通一切有為無為於中皆無有我非唯有漏苦諦上無由通諸法皆非有我故云通無我也四者無我所顯故云無我即以無我所顯真如從詮為名亦名無我從空所顯亦名為空據實道理是空之性今此論中於空顯據所而説空無我之性準此應知問由執迷二空斷執餘障斷異生伏事性障迷執已應已末鄣既無本執滅除故又問第六俱生修惑地地之中第九品斷前之八品唯斷迷事貪嗔慢等未至九品時迷事諸惑應非得斷以彼迷理本執在故或可斷八迷事本執且除末惑既亡本執除故解云斷惑自有二種一者除本末自然亡如論所明斷二執時餘鄣隨滅二從淺向深先粗後細如異生斷及那含不先斷迷事後斷二執各據一義亦不相違又解此難不然隨於何法證理斷執之時自斷迷理餘鄣斷故不可以彼迷事貪慢等鄣例迷理執之障又解修惑本末不定若見斷者先本斷末隨亡今此所明是見非修也第二火辨親勝等釋造論意略為二意謂證識性生實解故釋云全達二空證勝義識性名之為空此即空性依他八識及見相分空無所執亦名為空於唯識理如實知故此即雙於二空如實知故又解證二空所執於唯識理如實知證圓成了依他又解為生二智令達二空生根本智如實知故即生後得了俗之智也第三護法釋造論意如廣記説可知釋頌之中不異先判上三句通難標宗釋此頌文三師別釋義各不同初安慧師宗分成兩釋一云見相自體俱從種生以無體故解云雖無別種然由無始虗妄熏習執法自生體時內熏習力變似我法説從種生非謂有別種子而生名種生自體依他二分所執一云唯自體分有實體故説從種子生二分所執本來無體但無始已來虗妄熏習自體生時有二分起即所執性即依彼宗以釋頌文由彼假説我法者或世間聖教二種不同且世間以釋頌者謂自體分虗妄熏習種子生時變似見相遍計所執都無自體依此執為實我實法見相所執都無自性體我法此果無依於無假或有別無依總無謂即我法各別依於所執見相二分以無體故總説為無或可總無依別無謂我法二種總説為無見相二中或隨依一謂之別也依説依義如前記説次依聖教所説我法釋頌者此亦依於見相分施設我法亦得説為無依於無假總別對唯上可知若爾世間聖教二種何別同依於無故解云雖同依無義意即別世間我法唯計所執畢竟無體故名世間聖教我法為對遣彼世間我法故於見相假名施設故厚嚴經云為對遣愚夫所執實我法故於識所變假説我法名彼依識所變者謂依識所變遍計所執見相二分故説依世間聖教唯上應知又解彼依識所變者世間我法依識所變見相二分聖教我法但言依識義依識體而施設故問安慧宗見相二分既無實體施設世間我法可爾聖教依他我法如何得有依也第二難陀依二分義釋謂依所變依他相分執為我法故説依言世間執實初性所攝因此即説名無依於有假聖教所説我法二種此即依他義依於體總別相對準理應知第三護法釋頌尋常如廣記説安慧等三師同引厚嚴經為對遣愚夫等頌各約自宗以釋如安慧釋云於識所變世間我法據識聖教我法也又解俱依所變説二我法如前我主由假説者此有二義一云約説二云約義初説者遍計所執我法二種俱由倒情橫計為實依依彼倒情隨起言説謂為實有所説我法畢竟無實如空華等二約義者唯有倒心橫計為有此所執我法從本來無如空華等問若爾義之與説俱約倒心所執無體以為二種説義何別解云倒心所執由約所説無體有但能説即為約説由自體上畢竟我法實無名為義也聖教我法亦有二種一由言説安立施設相見二分似我法二種相現名為約説二由依他體上自有似我法相不由言説安立方為有即是約義猶如庶愛安立似水自體非水如其次第約説就義分其二也然初計度為我法中所説我法依於倒心所執我法此即説為無依無倒心所執依於色心等即此説為無依於有然所説我法二相各別倒情所執總是一無此即別無依於總無或可言説我法是一無顛倒之心人法別執此即總無依別無有情橫執義中無依於見此即無依於有總別相對準上應思聖教之中約言就義者義依於體假依他見相目之為體似我法相名之為義我法若別自依相見言説安立此即就説別義依總或可總雙於見相唯説為法或唯説我此即總義依別體就義我法依見相總別相對準上應思此能變唯三者簡大乘一類師立一意識或簡小乘立六識或簡大乘唯八識而類唯三也異熟對多四句分別第七恆審了知了境相粗者或了境而非相粗七八二識或有粗相而非了境六心所或有了境亦相粗謂六識心王或俱非七八心所夫論説我略有五義一主如主宰如臣王有自在之用臣有割斷之能義同我故二主謂自性宰是差別三主是我體宰是我用四主即是我宰即所也五約法用主之與宰自在割斷俱是法之作用法謂軌持軌者即生解持者持自性名不捨自性四對分別一無法有法體軌唯有法持且通無二自性差別軌唯差別持且通二三有為無為對軌唯有為持通二種四先陳後説體先陳者是持即是有法後説名軌即是宗法如聲是無常等也又解彼四對説無體法亦名為軌豈可龜毛體是無法不能生解色心自性類此亦然無為亦然無分別智豈無軌義先陳唯有法也預流來等等即更等獨覺菩薩及如來等有説約地差別以解等言理且不然約地義別不離因果二位人故言有情命者等依世親般若論我有四名一謂我二衆生三命者四壽者我為總名餘約三世為三約過去世名曰衆生受多生故約現在世名為命者以能任持一期法故約未來世名為壽者以於未來更受衆生故若依瑜伽八十三有八種名一我二有情三意生四摩納縛迦五養育者謂能增長後有業故六補特伽羅七命者八生者初我者論自釋云於五取蘊我我所見現前行故解云謂執我者以一蘊為我餘蘊為所故有我見及我所見現前也言有情者謂諸堅聖如實了知唯有根識等法更無有餘能執我者謂根識外別有於我能有於情能見聞等名為有情又復於彼諸塵境界能起愛著名意有情意生者謂云此是意種類者意云愛生故摩納縛迦者依止於意或爾下者摩納縛迦此云儒童美容小兒意云此我猶如小兒其性不定或高或下於劣己而起爾慢於勝己者即生卑下養育者能資長後有在業故謂能為後世因長養後有故能作一切士夫業故者約於現在世養身事業補特伽羅者名數取趣故七命者謂壽和合現存話故意云謂有實我與壽和合得現存話故八生者謂具生等所有法故意云若依瑜伽第十有十若依能般若有九前八中加士夫若依大般若四百一十卷有十三名於前九中更加作者受者知者見者大般若四百二卷中有十七名加使作者使受者使知者使見者所以加此經論異者世親般若約我總別義分為八而不約世所以唯八更加士夫者八中通用故同士夫説十三者明其別用五根名見者意根名知者意明由我依彼六根取境不同故分二止我作業受果名作者受者説十七更加別用之中能使真我即説名為使作及受知見也使見者等即是離蘊神我我能更令彼六根取境差別故也思之蘊處界等者於修多羅次第求蘊處界一一差別次第而尋常知毗尼即顯以緣求隨制戒必有所由阿毗達磨以性相求但顯性相道理而已也等諸善巧婆娑第六四種處界緣起處非處問何故名善巧解云此等法門善巧之智安立法門從因受名或此法能生善巧之智從果受稱處界者止何故名巧由對病故處除迷色起我見者界除遍迷色心病者緣起説因緣生起等法處非處者善因業果名處惡因業果名非處有處加蘊者除迷心所病者加根者二十二根加諦即世出世因果也乘者一乘三乘之義也世者明世世道理者為無為可知釋頌變言二復次釋前約三分安慧護法後依二分難陀親勝等諸師問釋論中依護法宗六七二識有執及鄣五八非執何故論云我法分別熏習力故諸識生時變似我法唯應二識似我法生解有二釋一云由六七識是能遍緣諸識相見二分執為我法熏成種故六七生時緣彼諸識相見二分變似我法非謂五八自執我法彼無慧故二云且依大乘解有漏義與漏俱故名為有漏由彼五八與執俱故名為有執非謂五八自體有執心雖有二解後釋為正或言二識非一名諸識是假境所依事故亦勝義有總作二釋如廣記説一云約三性釋云境依識故唯世俗有者此所執性識是境依亦通勝義者此明識體非但依他是世俗世有由是聖智所知亦是勝義有即以止勝家所有境界也二云此親光及護法門徒以釋境依識變雖是依他虗疏不實唯世俗有護法門人云見相俱依他起自體變故虗疏不實故云境依內識自體分故唯世俗有識是境依故通勝義也破我體同法云舉天授我作業時亦應作業以我一故如天授我業果及身者身謂作業之身業謂所作之業果謂業所生果也破非即離我云總有四釋一云汝所執我應不可説是我非我中以不可説故如不可説在有為無為中又諸所執實有我體為是我見所緣境不已下明我見所緣非所緣以破我問與後文云我見所緣定非實我何別解云彼外道宗所計真我彼體實有若以執我之見緣此便成我執沉輪生死若無真我還須內證方契真我如真如文中前明我見所緣境不此就執我之見以徵後又諸我見不緣實我即約證義正慧真見以責故有此差別應判此文總為六段一常遍等三二即離等二三二有慮等四有用等五我執所緣非所緣六正慧所緣問第六識中俱生我執三界九地斷西方釋取第四有釋遂第二果人斷欲六品不盡之失既爾例成第三果人斷欲不盡有此過失由此道理第五師釋地地品品別斷即無此過然違瑜伽後得斷惑者約菩薩説金剛心位三界九地俱生煩惱一時頓斷以金剛心真俗雙解義分正體後得力齊斷惑此後得智即金剛三昧一剎那中共斷一切迷理事惑若作此釋於理無違護法依此亦無過失又解依第四釋且九品中第一品惑理事俱有即以道雙斷理事最下品者起後得智斷第二品迷事起者以正體智斷迷理者如是展轉以後得智斷彼迷事惑九品俱斷迷理惑復雙斷於理無違思之第六識中俱生我執緣識所變五取蘊相第八識因所變具五果變門中不具唯有色蘊又通取八識所變可得具五若爾唯相見不緣自體所變故解云自體即是第四所變故如是展轉皆是所變或可唯取第六所變以彼通緣十八界故問薩婆多如何憶本所作解云依發智論自有二釋一云諸有情串習力得有如是同分智生一云由心心所法生於所緣定故其義如何且眼等六識於所緣境十二處中各於處定如眼於色處定一切廾種色並是眼識境若爾且一有情身在於此餘一切處所有諸色謝入過去能緣之識並非擇滅即無量眼識入不生法中由此於事青等次定俱眼識惑緣青黃等色其類各定或唯緣青或唯緣黃等或遍緣者各繫相屬若爾有青黃等能緣之識所緣青等雖入過去而此能緣未來世中同類是青黃等無量無邊是所緣類緣彼而生此亦何失若爾汝説於所緣類緣彼而生此亦何失未為決定由此道理能緣之識於所緣境剎那亦不得此剎那識定緣此境生若此境入過去此識闕緣畢竟不生雖舉剎那中能緣之識於緣所定若五識起與所緣境定同世以緣現在非過未故若其意識有唯緣過去者有遍緣二三世者由此道理所緣境定故境雖先入過去若此識生定須緣彼過去境生憶本所作問若心心所所緣境定於所依根亦應定應有修道無用失何者且如此根定生此識根生於識善染各定此根必定能生此識無有緣礙令其不生始從凡夫至於聖位染淨既定假令修道不能斷染要須依根生起須書解云今解不然但由識於根定非根於識定如心於境定非境於心定謂此識生必依此根非謂此根定生此識若其此識緣即不生此根即能生於餘識如此剎那心若不緣此境生境即能生於餘心即無過也婆娑十一有八論師憶本所作一我人論者由有我故先見聞者領納不妄故能憶之二物相隱論者非彼作是説諸有為法有晝夜二分晝時所作隱本所作三相變論者彼作是説如羯羅藍變作頞部曇等乃至衰老如即青葉變作黃葉由此體轉變不滅能憶所作四相往外道彼作是説由前作法往至後念前念不滅與後念並增故能憶所作五覺性是一論者彼作是執前作事覺與後憶覺相用雖殊其性是一作憶之覺既同由此即能憶本所作六塵界是常論者彼作是執六識雖性滅而意界是常意界者謂六識已外別有意界常無生滅憶持境界明記不妄也七二蘊論者蘊有二種一根本蘊二作用蘊本蘊是常用蘊非常二蘊雖別而失和合成一有情由此本蘊無有生滅持所緣境令不妄失憶本所作八前心往後心論者彼作是説心法冥通前心所作必告後心如是展轉經多剎那以前告後更相分付由此道理憶本所作西方瞿彼引阿毗達摩經頌證五識不緣假境頌云無有眼等識不緣實境生亦實亦不實解云第三句通三種實不實為二並二為三問憶識等三難迷何義起執解云迷三緣生初自性次受用後愛非愛問俱生我見有何所由稱之為細解云多義故稱之為細一相微隱任運而生不假三緣而得生起二世俗六行不能伏故故下論云而不能伏細俱生故三見道不斷故四九地第九無間道時方能斷故前八斷道不能斷彼迷理惑故五超越羅漢前八斷道斷不盡故如利根者以三界修惑總為九品九無間道斷之欲界初只斷時悲相初品一時俱斷問斷俱生執後修道中數數習道斷耶解云此就三乘通論大乘雖修位留惑二乘修地地別別斷通約三乘隨其所應有斷不斷故無有失若約大乘但修道數數而數數斷惑又解云此就三乘人約識分別二乘修位斷第六識俱生身邊二見此即斷數數第七俱見要至金剛此則修位數數習其道而非斷數若約大乘六七二識惑俱品斷此則數習其道而非數前斷又解此約大乘現種分別若約種子修位不斷俱生諸惑故留惑故此則數習斷道而非斷種若約現行地地漸伏説之為斷至第四地第六俱身邊二見至第七地滿心中方能盡也第七識俱身見等惑畢竟不行説之為斷俱貪慢等準此則名為數斷又解此就大乘種子粗重相對以釋以約種子故留不斷此則明其道斷數習也若約粗重無堪任性地地斷之約此義邊故云數也如上諸釋各據一乘亦不相違問俱身邊二見細也道伏無能分別二見粗世道應能伏解云二見行粗六行能伏解不欲表分別粗世道皆能伏又解此就俱生惑中自辨粗細非對見惑故無有失俱生貪等迷事起者六行伏故相微細亦同此難問見道不斷名為細者見道斷者應是其粗解云若對俱生應作此釋若爾何故三心見道初有情假稱為耎品次明法假名為中品修道修惑亦得稱為微細難斷解云粗細據義不同見道所斷理實是粗名耎品者約能道劣故名耎非謂煩惱細故名耎修位所斷理實斷道明利強威約能斷道應説粗強約彼煩惱行相微細之不相違問憶識誦習不成等三難迷何理作解云初之迷自性緣生故非此難自性緣生謂第八識能持因緣親生諸法故論云各有本識任持種子外道不了謂我憶識等耳次作業受果不成難迷受用緣生受用緣生者有二釋一云六識受用塵境為緣能生諸法也一云六識從緣而生受用境界非我作業受果不成難三輪回趣寂不成難者迷愛非愛緣生作如是計理實惡趣受生由不善業善趣受報由諸善業善惡二業如其次第愛非愛緣生也薩埵等三翻名者薩埵為有情翻為勇今取傍義有三謂黃貪樂黃即色德貪樂二種即是心位剌闍正云塵傍有三義謂赤嗔苦赤色德嗔苦二種心位答應正云暗傍有三義謂黑癡捨黑即色德癡捨心位此三各三合有九位於黃赤黑為色本性貪嗔癡煩惱本性樂苦捨受果本性雖舊多釋義理有闕今應云勇塵暗黃赤黑貪嗔癡樂苦捨如前配屬即是冥性中先有此九位於彼轉成大等二十三法色心差別色中法色黃色等轉成心中貪等及以樂等並用三德之內心位轉成也問何以不説有出離涅槃之法唯貪等耶解云此據生死分中説貪等法涅槃趣寂遂歸於冥故更不説有清淨法也問勝論宗中實句細大以生果故難令無常乃難內宗真如為境能生正智既能生果故應是無常解云不爾真如雖有果不成因以體是常不為智故又解不例真如為境界所以非智因粗果細大成常法亦生果問破無常法以有質礙應非實有解云不爾因明之法多分依遮而非取表此約質礙因遮彼無常有而彼非表空等無礙故非無礙生此等法皆準此釋破大有中四重比量初量法自相相違因彼宗計有離實等三以為宗法同以計非無同如德業為喻變成不異實等三句故彼立因違宗法也第二比量有法自相相違因以令大有成非有故第三四量比量相違文顯可知破同異句有五比量初之二量俱是有法自相相違因破自在中云待欲或緣者謂待衆生欲緣謂諸緣也或欲及緣亦應頓起因常有故者意云自在既一切物因欲之生因遂依生起既常有故緣欲亦應無不生時也有餘遍執明論聲常者然聲論計有本有末末計云時大梵天王説十萬字流行世間經多時天帝釋略之留一萬一千字流行於世後展轉復有仙人略之留八千字經於多時復有仙人畜一千字流行於世如是四説聲論本計此分是本明論之聲如是展轉更有異計即非本計非明論聲本明論聲表詮諸法即是常聲也問明論之聲為是誦彼明論聲為彼論中所明之聲説為常聲解云唯取誦明論聲以為常聲詮表定故內宗中説色心等所詮定故內宗所詮雖定能詮無常彼宗不爾由所詮定故能詮之聲計為常住也餘聲亦應非常聲體者體即能詮之聲名之為嚮非是實聲體者即是聲之體性也問數論宗中色性如何解云色雖有多青黃等異同變易為其色性變礙不殊色等應無差別又解不約蘊門中色此約十二處中色以同可見故名為色若以可見義同色性者應無青黃等異也既説前青黃明約處也色雖青黃不同同量可見義一就宗故為此破耳勝論宗中量德有五一微量亦名小量如二微所生法等二短量亦名粗量如二微果量三長量如三微已上果四大量如三微所生果等五圓量有二一小極微名微圓量二大如我空時方等四遍圓滿故破順世外道廣破有三初破因微次破粗果後約質礙並破因果餘準知此問第二等等何識所緣解云西方二釋不同謂眼及意差別不同問若爾五識現量得自相境如何説復五識得耶解云如長短等雖是假法五識亦緣此有何失若爾何故諸論皆云五識唯得自相非共相耶解云自相有三一處自相謂青黃長短等色同是色所故二事自相青黃等色體事別故三自相自相如一青黃等有多極微體各別故釋五識緣長短等者釋云依處自相説亦不相違不許五識緣假色者依事自相而説處自相等多種色故問勝論實句中意何因有礙解云彼宗雖非大造然有質礙如內宗四大種雖非大乘造然有質礙不同順世外道心是四大所造問云何名色法解云俱舍第一卷有二釋一云變壞故名色故彼云欲所惱壞欲所憂惱變壞生故有説變礙故名色解云第二釋約變壞質礙故名色若爾極微應不名色無變礙故此難不然無一極微各處而住衆微聚集變礙義成若爾過未應不名色以無聚集故解云彼宗現在極小有七極微二世不聚應不名色彼釋言曾當有變礙故彼種類故知所燒薪雖未即燒燒種類故若爾無表既無變礙應不名色有釋表色礙故無表隨彼亦受色名譬如樹動影亦隨動此釋不然世親所破無變礙故又表滅時無表應滅如樹滅時影必隨滅解云無表與表雖一時必起然表滅時無表不滅故為此難又釋所依大種有變礙故無表業得色名若不所依大種能有變礙故能依無表亦得色名眼等五識所依是色故眼等五識亦應名色此難不齊無表依大種時如影依樹光依珠寶眼等五識依眼等時則不如是唯能為依助生緣故此影依樹光依珠寶且非符順毗婆沙義彼宗影等顯色極微各自依止四大種故設許影光依止樹寶而無表色不同彼依彼許所依大種雖滅而無表色不順滅故是故所言來為尺難故有別釋順正理師言眼等五識所依不定或有變礙或無變礙有變礙者謂眼等五根無變礙者謂等無間意五識從無見依故即不名也無表不爾必依大衆故亦名色也問何故順正理釋上坐部義若依蘊所門中眼等十色即用極微所成假色為眼等根及色等境若約界門中即用實法為根及境解云蘊是積集義故聚多極微所成根境方是蘊義處是生識之處約用以談一一極微非根非境要聚多微方能生識故是假有界是性廢用談體故以實法名界別有體故也問薩婆多眼等五根極微所成依何相安布解云彼宗一釋能造四大傍布於下眼等極微於上安布四邊即有根依四塵各有所依能造四大眼根依處即有身根及能造大亦有根依四塵及能造大如一眼根微即有二十五微相隨而轉謂四眼根根四大及根依四塵及依處能造四大如是餘亦準知又有餘長養眼根等及以身根根依大種準此應知如是離住一云四大種微四邊安置根微處中如是展轉準知若爾眼根身根極微全小能造大種及所依四塵復有大種此則根微不遍如何取境不為根依及四大種耶有此過失若依經部能造所造展轉同處互相涉入然所造色或一大造或多大造大同大乘故正理云又言極小許五極微同在一處謂一所造色極微並能造四大故為五也既言極小準應許多此既同處故無前生若依大乘三種不相離同處不相離眼及身根等七物同處亦無眼身等不遍之失二種色四門分別一釋名二辨體三以三種不相離展轉體諸宗具義多少四問答分別釋名者先通後別二種色二見數色是質礙義即帶數釋也別名者一有對二無對言有對者眼等十色以極微成不得相越所住之處不相涉入故名有對無表等色非極微成無相礙用故名無對辨體者眼等十色為有對體諸宗共同若無對色諸宗不同薩婆多宗諸無表色為無對色大衆部身尺精進身輕安上坐部凶中肉團皆名無對解云身精進者謂身業勤恭敬之時有別精進無對之色於中動作身輕安者謂身安和準前可知若依經部以定境色為無對色故故俱舍第二云經説無對色定境界色若依大乘有對色同前無對色法處有五極逈極略受所引遍計所起定果色然薩婆多極微聚集為根境説為所成無別所成經部即有所成假色以為根境若上坐部蘊處門即假色為根境若界門即實色境若大乘眼等十處全分而生無實極微聚成諸色故大論第三云又非色聚中有實極微集成諸色乃至廣説名為有對三以三種不相離對辨多少者且依瑜伽決擇分等説三種不相離一同處不相離且如眼根隨其大小於中即有七物同處謂眼身根及能造地大及色香味觸能造不同薩婆多隨是一身皆具四大今大乘宗或一大造或二三四隨其所應如雜集等大論第三説云今此眼是堅性唯地大造及以根依色香味觸如是七法展轉相望皆同一處互相法入不相鄣礙如是解釋或復外色同大造者準此應知此同處即不離離持業釋也又解若以處為所依法為能依同處即不之不相離依主釋也二和雜亦名相雜不相離謂同大造色或內或外隨其所應諸物同處而不為一由諸根境各不同故非合一名和雜又解異大造色同在一處各為和雜由同處故亦名同處不相離三合不相離謂異大所造別聚相望和雜而住如豆麥等此最疏遠名為和合亦持業釋準上應知彼論舉瑜初云如衆燈光不相鄣礙次云如種種物石磨為末同在一處後云如一器麥等聚也二對汝宗辨具多少者先辨諸宗且經部宗能造所造皆是極微同薩婆多於中異者於所造中或一大造或二三四隨其所應多少不定而能造色然彼大種展轉相望或大望所造或以所造展轉相望得同處故正理第八云又言極小許五極微同在一處不相妨礙乃至廣説解云五者四大及所造中隨取一塵取知四大相望定得同處然大種望所造色既言極小許五同處準知所造有多極微亦得同處若不爾者何須説言極小五微得同一處又第十九云一四大種所生同類乳等造色有多極微俱時而起不相妨礙乃至廣説解云即準此文經部宗中亦許多微同一大造薩婆多宗諸所造色一一極微皆別大造一一色等皆具四大無有一色一二三大而能造者能造四大展轉相望或以能造望於所造或以所造展轉相望皆不同處不同大乘我及以經部然彼宗諸所造色以彼極微四邊即有四大極微於間空處復有根依四塵四塵復有能造根位四大眼根一微辨根依處總能所造二十五微眼根所依復有身根身根極微亦有四大根依色等一一各有能造四大如是一一微亦二十五如是展轉根微少能造根大根依極微其量極多展轉相離相依而住如是更有長養眼根並能造大根依四微及根依一大或即方便身善惡如是等類相離而住疏而非密也若依大乘真是俱有三不相離依經部宗唯得有二同處和合以非一色全分而生令麁色皆極微成不同大乘頓變一色即以覺慧擬宜分折諸五塵色而作極微而非極微由此知無相離不相離許能造等得同處故得有同處許一器麥等別大所造同處而住得有和合也又解經部許有四大能造諸色有多極微亦有相離也若依薩婆多四大望所造或四大相望或造色相望各各別處故無同處一一色等皆別造大故無和雜許一器麥等別大所造同聚雜住故有和合也四問答者問大種望所造既名為色應有質礙如何因處而不相礙答如瑜伽説更相隨順故也問有對大所造大造可名色無對非大造如何名為色答對法等説對色所引故相從亦説色問由色所引相從説色由礙所引相從説礙諸論為無對礙故解云變礙二義皆得名色問質礙以解色有色非有礙緣慮以解心有心非緣慮解云三種有對三門分別一釋名二辨體三手辨寬狹初釋名者先通後別通名三者數也謂色界等能有對礙或復物礙故名有對帶數釋也言鄣礙有對者色等十界處手相障礙不得同處故名障礙障礙即有對持業釋也言境界者謂五根七心及心所法能有境界物礙之法此別境界能障礙根等令不得於餘境而轉今言根等能有拘礙之境拘礙則是對義能有境界礙故有財釋也又解根是所礙境界是能礙今以所礙名為礙礙即屬根相等此則境界之有對依主釋也所緣有對二釋如別二辨體者鄣礙有對十色界為對然此鄣礙義通能所如婆娑云如以石打石以四打四以石打手以打五四塵身根以手打眼以五打五同前並眼如是準知隨其所應或多或少如理應思境界有對即以五根七心並法界少分心心所法為體所緣有對即以七心界並法界心所為體然境界有對唯礙於用而非礙體何以得知且如彼同分根雖不得詫對於境界體相續生同分眼等五識為依同取色等即被境礙且如眼根為色取礙而不得於聲處轉此唯礙彼取境之用所緣有對被礙於體以心心所託境而生如於青境而生不緣黃境得起故礙體也問境界所緣俱以七心有何差別解云對被礙用義邊即境界攝礙體義邊所緣門故一云體用俱礙取緣取收唯礙於用境界所攝若依經部與薩婆多境界所緣即有差別且如眼識本方緣青忽然黃色來奪礙彼眼識不於青生又如眼識欲取色境聲塵忽至耳識為生礙彼眼識令不於色而得轉生故論云是處心欲生他礙令不起彼宗六識不俱起故第三互辨寬狹四句蘭之且以境界對鄣礙互辨寬狹應作四句若以寬問狹須後句答以狹問寬順前句答手無寬狹答曰如是互有寬狹四句分別自有鄣礙非境界謂色等五塵自有境界非障礙謂七心並法界心所俱謂五根第四謂法處色與不相應無為等也二以境界對所緣自有境界非所緣謂五根是所緣非境界無此一句俱句謂七心及心所第四謂五塵法處不相應無為等法三以障礙對所緣二體各別得成二句自有障礙非所緣謂十色自有所緣非障礙七心界等俱句即無第四句謂法處色不相應無為等也又解云眼識緣長短者謂實不緣長等假色約能引意令取長等眼先見青等色引生後意意識緣青方見長短就引意説眼識緣假餘識準此論謂諸極微若有質礙應如瓶等是假非實問此量豈不以瓶為喻如薩婆多宗四塵是是瓶實即無體但有空名今以為喻喻上即無有質礙固應有能立不成過也解云此量對經部故無過也又解對薩婆多由所立因無隨一過下更破有極微實有也問大種望造色十因具幾答有八除隨説及相違非能詮相隨順故非二因問六因具幾答具三因同類俱有能作非善惡性非異熟因非煩惱故非遍行因非心心所故非相應因也問別解脫無表何大所造解云即用所妨身語能造四大造無表色若爾如何名無表色法處大造解云理實無表非實大造於思種上假立無表故説無表法處四大之所造問律儀既妨現行色色既不行如何有彼能造四大説用彼大造無表耶解云理實律儀體非是色隨彼所防假名為色由意識得名法處色今言大造假名大造隨彼所防相從説造也問依大乘宗極微有方分不解云有方無分不可折故若爾何故論云雖此極微猶有方分解云方謂六分即粗色之分又解云方即是分故云方分非謂可折説為方分問大乘立因果總有幾種解云二種子一種子三世二唯識三世種子三世者於種子上假立三世現作未作過去剎那現世在故具三世也唯識三世者於相分上現過去相如衆念通未來世如無眼通現在世可知問且如薩婆多宗未來世不許有同類因理實而論有次第不諸佛若知應有次第若不知可名一切智耶論云一剎那聲無詮表故者問此所立因依何有法解云依異生等位所有內聲量云汝宗內聲非實能詮一剎那無詮表故如外聲等若爾因不遍宗一剎那聲不遍長相續法故解云不爾今據有法橫尅言之皆是剎那聲所攝故故亦此因得遍宗法量云非佛餘位所有諸聲定非語表一剎那聲無詮表故如外風等若以佛聲為有法以是聲故作因即以諸異生聲為喻前已成故然依思願善惡分限假立無表此即別釋問佛有別解脫戒不解云必有若爾因位善惡思種增長可有無表佛果位圓思種不增如何可許有無表耶解云此文總別二處不同前總標中但言分限果位亦在其中別釋唯標因人所以但言增長若爾佛本期心果位圓滿分限已畢應無此戒解云佛心分限限永無盡故分限未是也分限即是願心所期如受戒者五八戒等宿願之所立分限也問期心分限隨入何定心以無表不説增耶解云亦增同別解脫戒亦有增長限又別解脫親對大師要須説增長長定皆違分所以不明增又解加行入定本意不欲心非也問何故顯揚律儀無表戒不現行諸立不律儀無表戒現行法立耶解云律儀期心止身語七支諸惡所以唯於所防建立不律儀但是為自活命等煞羊雞等事不立期心永斷諸善所以唯於現行建立言不現行法者非謂思種子名不現行約所防非不現起故名不現行法也問聲聞持身語無表唯七支菩薩亦制心無表應有十別解脫戒為難既然道定無表準此應爾解云今此文中三乘通論不別説之非謂菩薩不防意地又解菩薩意地實有無表今據相顯且説身語無表意地相隱略不説之問依大乘宗二無心定有無表不若無比量相違失若有依何處立解云無心定中不立無表定戒隨心彼無心故亦云定戒與定俱不言但定皆戒俱故無心雖定而無戒俱也大小乘中盡無文説問依護法釋至第三羯磨更起二種子新熏種子更有轉生種子由何因緣更起二種解云且依彼宗釋他意者由發善惡新熏成種擊發本種並榑生種子此二可見至緣俱時由聲力故更有種起並有榑生何失不生義也問三思中第三發動能所表中是何所攝解云若論業體此身語收若能所表中思成所表問大乘於思上立無表用何四大造解云我宗大論有文約所防是色立之名色不説所依能造大種以種準釋即取所防色處大種所造此亦無失若爾所防若起即有所防大種所防皆非由防不起如何説彼大種能造無表解云思上假立名之為色亦於所防假説大種又解云即用所依身處大種能造無失若爾如何觸處大種造法處色解云薩婆多無表不爾觸處大種無表故問定位無表對何界非解云身語二非唯在欲界意中染污三界具防若爾明未至定欲界身語所有諸非已得不起入初二定應無所防解云不爾對治有四謂伏斷時辨遠分此四對治謂即四道加行無間解脫勝進四道且今離下界欲持於聞思位折伏粗惑名伏對治初得未至正離欲持名斷對治後念已去即持對治然釋此持自有二義一謂任持所得無為二謂任持除道粗惑令不得起故名為持從此已後名為遠分以遠遮防令不起故問依此釋持對治已斷初禪煩惱不解云不定若無間道其次剎那解脫道中入根本定得斷彼惑若不爾者更修方便得入初禪方得斷也已上諸定四道相望準此應知已上諸地所有定戒望欲界非皆遠分也若望次所伏惑中四道如理應知問聲聞身語可唯欲界菩薩防意分限如何解云隨其所應入何地定防下地意非若入第四防下五地如是上下準此應知道俱戒依何地起若望身語唯防欲界四道差別準知應知若防意非通遮三界許依下地起道斷上諸地惑故也問依初定起無漏斷自地惑惑上地惑此無間道望欲界惑是何對治解云望下所斷皆成遠分非自同品所斷惑故問律儀有幾答如五十三説有百行律儀謂十種不善業道少分離十不善多分離十不全乃全分離十不善又復少持行十善謂一日夜或半月一月或半年或至一年不至命終若書刑持又若自持十善及教他持若稱揚讚述持十善又若見持十善染心愛悅生歡喜意是名十種十總名百行也問近住近事何別解云八名近住戒五名近事戒能此二種得名者受八戒者以持促故但以戒功德德邊涅槃善法而住若受五戒以持長故即得親事出家二衆故名近事問扇𢮎迦半擇迦得出家受具足戒不答不得故大論五十三云由此二種若置比丘衆中便參女過若置比丘尼衆中因摩觸等便參界過由此不應與衆共居是故不許此類出家及受戒具又由此二煩惱多故性煩惱障極覆障故問此二類能受三歸能持諸近事界所學處以不答得受破學而不得名近事以彼煩惱亦俱行故彼二出家衆亦不應親近彼故亦不攝受若摩若觸如是種類純然彼所受學處功能無別問扇𢮎迦及半擇迦半何別解云五十三説又半擇迦略有三種一全分二半分三損害若有生便不成男根名全分半擇迦若有半月起男勢用惑彼他於己為過惑見他行非梵行男勢便起是名一一分半擇迦若被力等損害或為病藥若大呪等之所損害先得男根今被斷壞既被壞已男勢不轉是名損害半擇迦初全分者名半擇迦亦名扇搋迦第二一分者唯名半擇迦非扇搋迦第三損害者若不被他於己為過唯名扇搋迦非半擇迦若有被他於己為過名半擇迦亦扇搋迦問何名心不相應行解云一依顯宗釋云心者謂此是心種類故解云以無礙故此簡色蘊不相應者簡受想行蘊心所有法及識行簡無為一云依正理釋言心不相應行者心言總顯六識心王是心所相應法今云不相應者簡行蘊中諸心所法是相應法故行顯言為顯行蘊即簡去色受想蘊及諸無為若依古來相傳但言非色不相應行非色簡色不相應即簡四蘊心所法行簡無為問入阿毗達摩論三種得法俱得多分如無覆無記心以劣鈍法但有法俱而無前後既言多分更有何法唯有法俱解云如上界有覆無記心所及色等如大梵王於馬勝比丘起諂並身恭敬相梵子起誑此並有覆色心此是劣鈍者但有法俱第二法前後多分如上界後結生時欲界所有善法問有何所由處有何法解云彼宗初受生唯是染污心於此剎那智能成就自地所有生得善一時頓得此雖未起有法前得得之等名類智邊世俗智等第三法後得多分如聞思慧等但有法收有何所由更有何法説多分言解云聞思慧以非殊勝善但俱後得及別解脫戒以色法有俱後得問既是善法何以無前後耶解云殊勝善如修慧及染行心法可得具三色法唯二破薩婆多宗云又具善惡無記得者善惡無記應頓現前以有得故解云難意具如一有情心中具三性法皆有得得三性應頓現前如三性眼識皆有得得法唯除異熟無記無法前得皆有云三性眼識應頓現前若爾大乘三性眼等諸識皆有種子應頓現前解云非唯種子更藉餘緣亦未來世有問準何得和大乘立得是假有耶解云五十二文立假破實故彼云復次云何得獲成就異謂若略説生緣攝受增盛之因説名為得由此道理當知得是假有若言得是實有此為是諸行生因為是諸法不離散因若是諸行生因者若從先來未得此法此既無有生因之得應常不生由此亦應畢竟不得若是諸法不離散因者一切善不善無記法得起既俱有彼雖相違應頓現行是俱二種俱不應理問十無學中正見正智有何差別解云正見推求義正智是決斷義正見通因果正智唯果謂盡智無生智所緣之境亦有差別正見緣無漏正智若緣煩惱滅名盡智若緣後果不生名無生智以是利益不必不退起諸惑故名無生智故所緣有漏攝苦集諦故或可鈍根唯有盡智問諸擇滅得於何處立解云於能證道而假建立問諸非擇滅得於何得法立解云不定若染汙法由六行道暫伏現行名非擇滅此得即於治道上立若自身中闕緣不起或本諸法非擇滅即於第八識或衆同分而假立之門種子非得於何處立解云於能違道隨其所應若已伏斷皆於能違假立非得若其染種即於伏道立現不成若對種子亦説名種用不成若約斷道唯得假立種子非得若無記種有云斷彼緣縛之時損彼種子生果功能即於斷道立彼非得此不應然能緣貪等且望色根及以五境業所成者名異熟生及威儀工巧劣者設令斷惑本無即彼二字即彼能緣煩惱於種子於有何因緣而損伏用且如身在欲界得離欲時於此根境及威儀等所有種子已斷緣時緣紜應不生果損種用故今解此等種子既是無覆無記不違治道即非六行所伏亦非治道所斷即非損用亦非斷體故知此種至圓滿果解脫道失所依捨由非治道永斷二障微細種故第八淨識從種而生因中染識並所持種俱時而捨故云由聖道力永斷害故非斷一切能緣縛故又解如生無色者威儀工巧異熟色等彼界全無損彼種用用亦可説而種子不成也又解彼五十二俱列二種種子以為種子成就威儀工巧一分並通果全為自性成就然釋種子成就中云未為定伏未為道害未為邪見所損而彼不言永斷聖道別屬彼無記種子彼論或可約染汙種伏用斷種説此二道略而不論無記種子生得善種子能違之或邪見用強故亦對説若準此釋隨其所應若伏若斷皆於能違假立非得向自在種子能不成就於何法云且作一釋一切有漏三慧種子無有非得一切有情皆成就故或可亦有非得以不現起即以欲界粗修惑上而建立之無漏種子無姓有情可有非得分別種上立之若爾三乘定姓更互望有非得有不此有二釋一云更互相望容互不成許有非得一云但有無漏種子即成聖法非要具足三乘道種通果無記亦有二釋一云依無漏定通所引生無性不成彼種子故有非得無性有有性無無漏故若有漏定所引通果一切有情無有非得有漏定皆悉成故一云並成無漏起通雖無彼所引心無差別故總成就也若威儀等無有非得以諸異生皆成就故若至果位解脫道中劣無漏並諸無記失所依捨亦得説為不成就也又解威儀等若生無色者威儀等種不生現行損彼種用亦可説為不成就也問種子所生現行且據染種何依不成解云諸位不同或有差別且約五道對諸識約諸染種並現不成就資根道至加行位第六識中分別煩惱漸伏不起説現不成未伏種故加行道中現定不成若約種子用亦不成若入見道種現二類俱得不成若俱生者第七識俱八地方伏名現不成第六識俱身遍二見並俱貪等四地伏盡名現不成若迷事起貪嗔慢等究竟伏盡要至八地方名非得此據任運若有一類猒煩惱者六識俱生入初地時一時頓伏令永不行此亦即是現行非得若據六行唯粗俱生迷事起者伏令不起隨何地中而起伏道亦同去彼現行非得若暫伏種不生現行損其生用而説亦有非得據體不斷亦有成就如生無色五根種子損用有體準此應知問立異生性通於三界見道所斷且如異生唯在欲界如何乃斷三界性也解云迷理惑通三界俱立異生唯一性不成多問非擇滅有非得不依大乘宗真如無為非擇滅攝此能非得依行法立解云真如本有一切有情皆悉成就無有非得若約詮問容有非得二障立之門有漏伏惑得非擇滅退起煩惱有非得不為是動不成為現不成解云現行不起名現不成種子無能自入種不成所攝起同事欲者一云同事者謂同事業隨其所化欲謂樂欲一云同事欲於同事業而起樂欲也破命根中量云汝宗命根非實命根離識實有故猶如如受等問外人反難如何通云大乘命根非假命根不離識故猶如受等解云問諸無記法云何耎中上答五十五云謂異熟生及威儀路不猛利故俱是下品諸工巧處性猛利故説名中品變化性極猛利故是上品又四種類各有差別謂無色界異熟是耎品色界是中品欲界是上品若臥若坐是耎威儀住是中威儀是上威儀初習業者是下工巧已串習者是中工巧堪為師者是上工巧下品修三磨地所得是耎變化中品修得是中變化上品修得是上變化如是等類應知問異熟等四唯無記亦通餘性不答不定故五十五云又異熟生一向無記二三可得一有二種解云中二通三性變化通二性彼云若依伎樂以染汙心發發起威儀是染污性若依寂靜即是善性解云行等威儀為煞盜等或行道恭敬等無記下知若依染著發起工巧是染污性若善加行所起工巧即是善性解云染污作煞具等善性化佛像等善染二性無記可知變化有二為引道八或為利益諸有情故而起變化即是善性此無染污俱舍論第四釋異生性初云獲一切若異此者諸佛世尊亦不成就二乘理性聖法應名異生若爾彼論應説純言者解云此意云此不獲言者據總未得聖道故言表離於獲若異我説全不獲故名為不獲者諸佛世尊唯大乘聖道不獲二乘應名異生若爾應説純言者難意云既不言純不獲一切聖道如何得智顯全不獲解云不要須説純但總言不獲已表純故問薩婆多宗一云世第一時捨異生性一云苦法忍生相捨異生滅相斷十煩惱一云二種苦捨如無間解脫二道者何意解第一法時捨此約生相彼宗苦忍生相於未來時有能捨異生性用故言有用言二時共捨者第一滅時無間道苦忍生時如解脫道云故二時共捨論難外人應無色時有別實物能礙於色名無色定外道云無心既立假無色應立假解云心種是定依於心種上假立定色種非定依總無色中不立假問猒色生無色一切色皆無猒心入無心一切心非有解云猒色生無色亦許有細色猒心入無心亦得有細心問猒色生無色業滅色皆盡猒心入無心異熟心亦無解云業色皆所猒業色無色無異熟心細猒麁不猒細問色有業非業業色皆所猒心中三性殊異熟心猒盡解云業色非總報所行皆猒盡細心總報收細心非猒盡問猒心種子已前何剎那中名微微心解云最後剎那名微微心第二剎那已前總名微心問無想異熟以何義業感解云無想之思招彼異熟問無想俱思通總現種於二思內以何因解云此有二釋一約種子二約現行於種子中分成二釋一云微微之思熏成種時即此種子一剎那中有二種力一能招彼總報第八名真異熟有一分力應防彼六紜識令不能生現行即此無心名無想報然此分位真異熟而假立故亦名異熟一云此所熏種而初剎那有力感彼第八第二剎那應防力增即能感彼無心分位以能遮彼六識種生不生果故餘義同前一云唯是現思微心已前現行思力能感彼天第八異熟微微心時猒力強故能感彼意無心之報由現思故生彼天中六識暫起猒增上故後更不生遮防思力伏彼種子故又解云微心位思感第八識微微之思招彼六識暫時現起此二位思至無心位就能招彼天六識不起時善分位問依大乘滅定有漏無漏耶解云無漏問有漏心勞慮故須猒無漏非勞慮心非成所猒解云無漏雖無勞慮為成就功德故須入定隨諸有情見聞增長道故
